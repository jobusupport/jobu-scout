Id('editMyTeamIdx').value = t.id;\n  document.getElementById('editMyName').value  = t.team_name    || '';\n  document.getElementById('editMyGcUrl').value = t.gc_team_url  || '';\n  document.getElementById('editMyPgUrl').value = t.pg_team_url  || '';\n  document.getElementById('editMyYear').value  = t.season_year  || '';\n  const seasons = (t.season_type || '').split(',').map(s => s.trim()).filter(Boolean);\n  document.querySelectorAll('.editMySeason').forEach(c => { c.checked = seasons.includes(c.value); });\n  document.getElementById('editMyTeamError').style.display = 'none';\n  document.getElementById('editMyTeamModal').style.display = 'flex';\n  document.getElementById('editMyName').focus();\n}\nfunction hideEditMyTeam() {\n  document.getElementById('editMyTeamModal').style.display = 'none';\n  document.getElementById('editMyTeamError').style.display = 'none';\n}\nasync function submitEditMyTeam() {\n  const teamId  = document.getElementById('editMyTeamIdx').value;\n  const name    = document.getElementById('editMyName').value.trim();\n  const gcUrl   = document.getElementById('editMyGcUrl').value.trim();\n  const pgUrl   = document.getElementById('editMyPgUrl').value.trim();\n  const year    = document.getElementById('editMyYear').value.trim();\n  const seasons = [...document.querySelectorAll('.editMySeason:checked')].map(c => c.value);\n  const err     = document.getElementById('editMyTeamError');\n  if (!name) { err.textContent = 'Team name is required.'; err.style.display = 'block'; return; }\n  if (!year) { err.textContent = 'Team year is required.'; err.style.display = 'block'; return; }\n  if (!seasons.length) { err.textContent = 'Choose at least one season.'; err.style.display = 'block'; return; }\n\n  const res = await apiFetch(`/api/teams/${teamId}`, {\n    method: 'PUT',\n    body: JSON.stringify({\n      teamName: name, gcTeamUrl: gcUrl, pgTeamUrl: pgUrl,\n      seasonYear: year, seasonType: seasons.join(','),\n    }),\n  });\n  const data = await res.json().catch(() => ({}));\n  if (!res.ok) { err.textContent = data.error || 'Failed to update team.'; err.style.display = 'block'; return; }\n\n  hideEditMyTeam();\n  await loadTeams();\n}\nfunction renderMyTeams() {\n  const list = document.getElementById('myTeamList');\n  if (!list) return;\n  const myTeams = getMyTeams();\n  if (!myTeams.length) {\n    list.innerHTML = `<div class=\"empty\" style=\"padding:18px 14px\"><p style=\"font-size:12px;color:var(--muted)\">No team set yet.<br>Click <b style=\"color:var(--accent)\">+ Add<\u002Fb> to enter your team.<\u002Fp><\u002Fdiv>`;\n    return;\n  }\n  list.innerHTML = myTeams.map((t) => `\n    <div class=\"team-item ${String(selectedTeam?.id) === String(t.id) ? 'active' : ''}\"\n         data-team-id=\"${escHtml(t.id)}\"\n         onclick=\"selectTeamById(this.dataset.teamId)\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n        <div class=\"team-name\">${escHtml(t.team_name)}<\u002Fdiv>\n        <div class=\"team-actions\">\n          <button class=\"team-kebab-btn\" title=\"More actions\" onclick=\"event.stopPropagation(); toggleTeamMenu(event, '${escHtml(t.id)}')\">⋯<\u002Fbutton>\n          <div class=\"dropdown-menu\" id=\"teamMenu-${escHtml(t.id)}\">\n            <button class=\"dropdown-item\" onclick=\"event.stopPropagation(); closeAllMenus(); showEditMyTeam('${escHtml(t.id)}')\">Edit<\u002Fbutton>\n            <button class=\"dropdown-item danger\" onclick=\"event.stopPropagation(); closeAllMenus(); removeMyTeam('${escHtml(t.id)}')\">Remove<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"team-meta\">\n        ${t.season_year ? `<span class=\"badge badge-year\">${escHtml(t.season_year)}<\u002Fspan>` : ''}\n        ${(t.season_type || '').split(',').map(s => s.trim()).filter(Boolean).map(s => `<span class=\"badge badge-season\">${escHtml(s)}<\u002Fspan>`).join('')}\n        ${t.gc_team_url ? `<span class=\"badge badge-gc\">GC ✓<\u002Fspan>` : ''}\n        ${t.pg_team_url ? `<span class=\"badge badge-pg\">PG ✓<\u002Fspan>` : ''}\n        <span class=\"badge badge-games\">${escHtml(t.game_count ?? 0)} games<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\n\n// ── Render main panel ─────────────────────────────────────────────────────────\nfunction renderMain() {\n  const t = selectedTeam;\n  if (!t) return;\n\n  const s        = t.stats || {};\n  const lastGame = t.last_game ? new Date(t.last_game + 'T12:00:00').toLocaleDateString() : '—';\n\n  document.getElementById('mainPanel').innerHTML = `\n    <div class=\"team-panel\">\n      <div class=\"team-title\">${escHtml(t.team_name)}<\u002Fdiv>\n      <div class=\"team-summary\">\n        <span>${s.games ?? s.game_count ?? t.game_count ?? 0} games<\u002Fspan>\n        <span class=\"dot-sep\">·<\u002Fspan>\n        <span>${s.wins ?? '—'}-${s.losses ?? '—'}${s.ties ? '-' + s.ties : ''}<\u002Fspan>\n        <span class=\"dot-sep\">·<\u002Fspan>\n        <span>${s.batters ?? '—'} batters<\u002Fspan>\n        <span class=\"dot-sep\">·<\u002Fspan>\n        <span>Last ${lastGame}<\u002Fspan>\n        <span class=\"dot-sep\">·<\u002Fspan>\n        <span class=\"${t.hasGC ? 'ok' : 'warn'}\">GC ${t.hasGC ? 'Ready' : 'Missing'}<\u002Fspan>\n        <span class=\"dot-sep\">·<\u002Fspan>\n        <span class=\"${t.hasPG ? 'ok' : 'warn'}\">PG ${t.hasPG ? 'Ready' : 'Missing'}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"team-urls\">\n        ${t.gc_team_url ? `<a class=\"url-link\" href=\"${t.gc_team_url}\" target=\"_blank\"><svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M9 15a5 5 0 0 0 7 0l3-3a5 5 0 1 0-7-7l-1 1\"/><path d=\"M15 9a5 5 0 0 0-7 0l-3 3a5 5 0 1 0 7 7l1-1\"/><\u002Fsvg> GameChanger<\u002Fa>` : ''}\n        ${t.pg_team_url ? `<a class=\"url-link\" href=\"${t.pg_team_url}\" target=\"_blank\"><svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M9 15a5 5 0 0 0 7 0l3-3a5 5 0 1 0-7-7l-1 1\"/><path d=\"M15 9a5 5 0 0 0-7 0l-3 3a5 5 0 1 0 7 7l1-1\"/><\u002Fsvg> Perfect Game<\u002Fa>` : ''}\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    ${renderPipelineActions()}\n\n    <div class=\"main-tabs\" id=\"mainTabs\">\n      ${t.is_our_team ? `\n      <div class=\"main-tab ${activeTab==='self'?'active':''}\"     onclick=\"switchTab('self')\">Self-Scout<\u002Fdiv>\n      <div class=\"main-tab ${activeTab==='matchup'?'active':''}\"  onclick=\"switchTab('matchup')\">Matchup<\u002Fdiv>\n      ` : `\n      <div class=\"main-tab ${activeTab==='run'?'active':''}\"      onclick=\"switchTab('run')\">Single Opponent Scout<\u002Fdiv>\n      `}\n      <div class=\"main-tab ${activeTab==='games'?'active':''}\"    onclick=\"switchTab('games')\">Games<\u002Fdiv>\n      <div class=\"main-tab ${activeTab==='reports'?'active':''}\"  onclick=\"switchTab('reports')\">Reports<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"main-content\">\n      ${t.is_our_team ? `\n      <!-- SELF-SCOUT TAB -->\n      <div class=\"main-pane ${activeTab==='self'?'active':''}\" id=\"pane-self\">\n        ${renderSelfPane()}\n      <\u002Fdiv>\n\n      <!-- MATCHUP TAB -->\n      <div class=\"main-pane ${activeTab==='matchup'?'active':''}\" id=\"pane-matchup\">\n        ${renderMatchupPane()}\n      <\u002Fdiv>\n      ` : `\n      <!-- RUN TAB -->\n      <div class=\"main-pane ${activeTab==='run'?'active':''}\" id=\"pane-run\">\n        ${renderRunPane()}\n      <\u002Fdiv>\n      `}\n\n      <!-- GAMES TAB -->\n      <div class=\"main-pane ${activeTab==='games'?'active':''}\" id=\"pane-games\">\n        <p class=\"log-empty\" style=\"color:var(--muted)\">Loading games...<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- REPORTS TAB -->\n      <div class=\"main-pane ${activeTab==='reports'?'active':''}\" id=\"pane-reports\">\n        <p class=\"log-empty\" style=\"color:var(--muted)\">Loading reports...<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    ${renderJobLogBar()}\n  `;\n\n  if (activeTab === 'games')   loadGames();\n  if (activeTab === 'reports') loadReports();\n}\n\n// ── Pane renderers ────────────────────────────────────────────────────────────\n\nfunction renderPipelineActions() {\n  const t = selectedTeam;\n  return `\n    <div class=\"run-section\">\n      <div class=\"actions actions-hierarchy\">\n        <button class=\"btn btn-primary\" onclick=\"runJob('full-pipeline')\" ${t.game_count<1&&!t.gc_team_url?'disabled':''}><svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" fill=\"currentColor\"><path d=\"M7 4v16l13-8z\"/><\u002Fsvg> Full Pipeline<\u002Fbutton>\n        <button class=\"btn btn-secondary\" onclick=\"runJob('report')\" ${t.game_count<1?'disabled title=\"No games yet\"':''}><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z\"/><path d=\"M14 3v5h5\"/><path d=\"M9 13h6M9 17h4\"/><\u002Fsvg> Generate Report<\u002Fbutton>\n        <span class=\"actions-divider\"><\u002Fspan>\n        <button class=\"btn btn-utility\" onclick=\"runJob('gc-scraper')\">GC Scrape<\u002Fbutton>\n        <button class=\"btn btn-utility\" onclick=\"runJob('pg-scraper')\" ${!t.pg_team_url?'disabled title=\"No PG URL\"':''}>PG Scrape<\u002Fbutton>\n        <div class=\"dropdown-wrap\">\n          <button class=\"btn btn-utility\" onclick=\"toggleMoreMenu(event)\">More ▾<\u002Fbutton>\n          <div class=\"dropdown-menu\" id=\"pipelineMoreMenu\">\n            <button class=\"dropdown-item\" onclick=\"closeAllMenus(); runJob('reingest')\">Reingest<\u002Fbutton>\n            <button class=\"dropdown-item\" onclick=\"closeAllMenus(); ${t.is_our_team ? `showEditMyTeam('${escHtml(t.id)}')` : `showEditTeam('${escHtml(t.id)}')`}\">${t.is_our_team ? 'Edit Team' : 'Edit Opponent'}<\u002Fbutton>\n            <button class=\"dropdown-item danger\" onclick=\"closeAllMenus(); ${t.is_our_team ? `removeMyTeam('${escHtml(t.id)}')` : `removeOpponent('${escHtml(t.id)}')`}\">Remove Team<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <hr class=\"divider\">\n  `;\n}\n\n// Single shared Job Log — used by every job type (GC/PG/Reingest/Generate\n// Report/Full Pipeline/Self-Scout/Matchup). Rendered once, at the bottom of\n// the panel, regardless of which tab is active, so there is never more than\n// one Job Log visible at a time.\nfunction renderJobLogBar() {\n  return `\n    <hr class=\"divider\">\n    <div class=\"job-log-bar\">\n      <span id=\"jobStatusPill\" class=\"status-pill status-idle\">Idle<\u002Fspan>\n      <span id=\"jobLabel\" style=\"color:var(--muted)\">No job running<\u002Fspan>\n      <button class=\"refresh-btn stop-job-btn\" onclick=\"stopCurrentJob()\">Stop Job<\u002Fbutton>\n      <button class=\"refresh-btn\" id=\"jobLogToggleBtn\" onclick=\"toggleJobLogDrawer()\" style=\"margin-left:auto\">View Logs<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"job-log-drawer\" id=\"jobLogDrawer\">\n      <div class=\"log-container\" id=\"logContainer\">\n        <p class=\"log-empty\">Run a pipeline step above to see logs here.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction toggleJobLogDrawer() {\n  const drawer = document.getElementById('jobLogDrawer');\n  const btn = document.getElementById('jobLogToggleBtn');\n  if (!drawer) return;\n  const open = drawer.classList.toggle('open');\n  if (btn) btn.textContent = open ? 'Hide Logs' : 'View Logs';\n}\n\nfunction renderRunPane() {\n  return `\n    <div class=\"section-label\">Report Options<\u002Fdiv>\n\n    <div class=\"options-grid\">\n      <div class=\"opt-group\">\n        <label>Game Location<\u002Flabel>\n        <input class=\"opt-input\" id=\"opt-location\" type=\"text\" placeholder=\"e.g. Huntsville, AL\"\n          value=\"${escHtml(opts.gameLocation)}\" oninput=\"opts.gameLocation=this.value\">\n      <\u002Fdiv>\n      <div class=\"opt-group\">\n        <label>Game Date<\u002Flabel>\n        <input class=\"opt-input\" id=\"opt-date\" type=\"date\"\n          value=\"${opts.gameDate}\" oninput=\"opts.gameDate=this.value\">\n      <\u002Fdiv>\n      <div class=\"opt-group\">\n        <label>Game Time<\u002Flabel>\n        <input class=\"opt-input\" id=\"opt-time\" type=\"time\"\n          value=\"${opts.gameTime}\" oninput=\"opts.gameTime=this.value\">\n      <\u002Fdiv>\n      <div class=\"opt-group\">\n        <label>Game Scope<\u002Flabel>\n        <select class=\"opt-select\" id=\"opt-scope\" onchange=\"opts.gameScope=this.value\">\n          <option value=\"all\" ${opts.gameScope==='all'?'selected':''}>Entire Season<\u002Foption>\n          <option value=\"last10\" ${opts.gameScope==='last10'?'selected':''}>Last 10 Games<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"obs-group\">\n      <label>Human Observations <span style=\"font-weight:400;text-transform:none;letter-spacing:0\">(live scouting notes — tell Jobu what you know and what you have seen)<\u002Fspan><\u002Flabel>\n      <textarea class=\"obs-textarea\" id=\"opt-obs\" placeholder=\"e.g. Their #12 has a big leg kick and struggles with inside fastballs. Catcher has a weak arm, ran on him twice. Their CF was shading right on all their lefties...\"\n        oninput=\"opts.humanObs=this.value\">${escHtml(opts.humanObs)}<\u002Ftextarea>\n    <\u002Fdiv>\n  `;\n}\n\nfunction renderSelfPane() {\n  return `\n    <div class=\"mode-notice\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"11\" cy=\"11\" r=\"7\"/><path d=\"m20 20-3.2-3.2\"/><\u002Fsvg> Self-Scouting Mode — analyzes YOUR team's data for internal coaching review<\u002Fdiv>\n\n    <div class=\"section-label\">Self-Scout Options<\u002Fdiv>\n\n    <div class=\"options-grid\">\n      <div class=\"opt-group\">\n        <label>Game Location<\u002Flabel>\n        <input class=\"opt-input\" type=\"text\" placeholder=\"e.g. Huntsville, AL\"\n          value=\"${escHtml(opts.gameLocation)}\" oninput=\"opts.gameLocation=this.value\">\n      <\u002Fdiv>\n      <div class=\"opt-group\">\n        <label>Game Date<\u002Flabel>\n        <input class=\"opt-input\" type=\"date\" value=\"${opts.gameDate}\" oninput=\"opts.gameDate=this.value\">\n      <\u002Fdiv>\n      <div class=\"opt-group\">\n        <label>Game Scope<\u002Flabel>\n        <select class=\"opt-select\" onchange=\"opts.gameScope=this.value\">\n          <option value=\"all\" ${opts.gameScope==='all'?'selected':''}>Entire Season<\u002Foption>\n          <option value=\"last10\" ${opts.gameScope==='last10'?'selected':''}>Last 10 Games<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"obs-group\">\n      <label>Coach Notes <span style=\"font-weight:400;text-transform:none;letter-spacing:0\">(things you want Claude to focus on)<\u002Fspan><\u002Flabel>\n      <textarea class=\"obs-textarea\" placeholder=\"e.g. We've been struggling with two-strike approaches. Our pitchers are throwing too many first-pitch balls. Focus on our RISP situations...\"\n        oninput=\"opts.humanObs=this.value\">${escHtml(opts.humanObs)}<\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div class=\"obs-group\">\n      <label>Custom Self-Scout Prompt <span style=\"font-weight:400;text-transform:none;letter-spacing:0\">(optional — overrides default self-scouting instructions)<\u002Fspan><\u002Flabel>\n      <textarea class=\"obs-textarea\" style=\"min-height:90px\" placeholder=\"e.g. Focus exclusively on our lineup's performance against left-handed pitching. Identify which hitters handle LHP well and which ones struggle. Give me a recommended batting order adjustment...\"\n        oninput=\"opts.customPrompt=this.value\">${escHtml(opts.customPrompt)}<\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div class=\"actions\">\n      <button class=\"btn btn-scout\" onclick=\"runSelfScout()\" ${selectedTeam?.game_count<1?'disabled title=\"No games yet\"':''}><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"11\" cy=\"11\" r=\"7\"/><path d=\"m20 20-3.2-3.2\"/><\u002Fsvg> Generate Self-Scout Report<\u002Fbutton>\n    <\u002Fdiv>\n  `;\n}\n\nfunction renderMatchupPane() {\n  // Default \"Our Team\" to whichever My Team is currently selected.\n  if (!opts.matchupOurTeamId && selectedTeam?.is_our_team) {\n    opts.matchupOurTeamId = selectedTeam.id;\n  }\n\n  const teamOptions = allTeams.map(t =>\n    `<option value=\"${t.id}\" ${String(t.id)===String(opts.matchupOurTeamId)?'selected':''}>${escHtml(t.team_name)}<\u002Foption>`\n  ).join('');\n  const oppOptions = allTeams.filter(t => !t.is_our_team).map(t =>\n    `<option value=\"${t.id}\" ${String(t.id)===String(opts.matchupOppTeamId)?'selected':''}>${escHtml(t.team_name)}<\u002Foption>`\n  ).join('');\n\n  return `\n    <div class=\"mode-notice matchup-notice\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><polyline points=\"14.5 17.5 3 6 3 3 6 3 17.5 14.5\"/><line x1=\"13\" y1=\"19\" x2=\"19.5\" y2=\"12.5\"/><line x1=\"16\" y1=\"16\" x2=\"20\" y2=\"20\"/><polyline points=\"14.5 6.5 18 3 21 3 21 6 17.5 9.5\"/><line x1=\"5.5\" y1=\"13.5\" x2=\"11\" y2=\"19\"/><line x1=\"8\" y1=\"16\" x2=\"4\" y2=\"20\"/><\u002Fsvg> Head-to-Head Matchup — identifies pitcher/hitter matchups and game plan vs a specific opponent<\u002Fdiv>\n\n    <div class=\"section-label\">Teams<\u002Fdiv>\n    <div class=\"matchup-grid\">\n      <div class=\"matchup-team-box\">\n        <label>Our Team<\u002Flabel>\n        <div class=\"team-select-wrap\">\n          <select id=\"matchup-our\" onchange=\"opts.matchupOurTeamId=this.value\">\n            <option value=\"\">— Select our team —<\u002Foption>\n            ${teamOptions}\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"matchup-team-box\">\n        <label>Opponent<\u002Flabel>\n        <div class=\"team-select-wrap\">\n          <select id=\"matchup-opp\" onchange=\"opts.matchupOppTeamId=this.value\">\n            <option value=\"\">— Select opponent —<\u002Foption>\n            ${oppOptions}\n          <\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-label\">Game Context<\u002Fdiv>\n    <div class=\"options-grid\">\n      <div class=\"opt-group\">\n        <label>Game Location<\u002Flabel>\n        <input class=\"opt-input\" type=\"text\" placeholder=\"e.g. Huntsville, AL\"\n          value=\"${escHtml(opts.gameLocation)}\" oninput=\"opts.gameLocation=this.value\">\n      <\u002Fdiv>\n      <div class=\"opt-group\">\n        <label>Game Date<\u002Flabel>\n        <input class=\"opt-input\" type=\"date\" value=\"${opts.gameDate}\" oninput=\"opts.gameDate=this.value\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"obs-group\">\n      <label>Probable Pitchers (Opponent) <span style=\"font-weight:400;text-transform:none;letter-spacing:0\">(optional — tell Claude who you expect on the mound)<\u002Fspan><\u002Flabel>\n      <input class=\"opt-input\" style=\"width:100%\" type=\"text\" placeholder=\"e.g. #12 Johnson (ace), #7 Williams (lefty reliever likely in later innings)\"\n        value=\"${escHtml(opts.matchupProbable)}\" oninput=\"opts.matchupProbable=this.value\">\n    <\u002Fdiv>\n\n    <div class=\"obs-group\">\n      <label>Human Observations <span style=\"font-weight:400;text-transform:none;letter-spacing:0\">(live notes from watching them)<\u002Fspan><\u002Flabel>\n      <textarea class=\"obs-textarea\" placeholder=\"e.g. Their ace is sitting 77-80 with a sharp 12-6 curve. Saw them live Tuesday — they struggle to cover the outer third with RISP...\"\n        oninput=\"opts.humanObs=this.value\">${escHtml(opts.humanObs)}<\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div class=\"obs-group\">\n      <label>Custom Matchup Focus <span style=\"font-weight:400;text-transform:none;letter-spacing:0\">(optional — direct what the AI focuses on)<\u002Fspan><\u002Flabel>\n      <textarea class=\"obs-textarea\" style=\"min-height:72px\" placeholder=\"e.g. Focus on identifying which of our hitters have the best historical matchup profile against the type of pitching this team throws. Recommend specific lineup adjustments...\"\n        oninput=\"opts.customPrompt=this.value\">${escHtml(opts.customPrompt)}<\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div class=\"actions\">\n      <button class=\"btn btn-matchup\" onclick=\"runMatchup()\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><polyline points=\"14.5 17.5 3 6 3 3 6 3 17.5 14.5\"/><line x1=\"13\" y1=\"19\" x2=\"19.5\" y2=\"12.5\"/><line x1=\"16\" y1=\"16\" x2=\"20\" y2=\"20\"/><polyline points=\"14.5 6.5 18 3 21 3 21 6 17.5 9.5\"/><line x1=\"5.5\" y1=\"13.5\" x2=\"11\" y2=\"19\"/><line x1=\"8\" y1=\"16\" x2=\"4\" y2=\"20\"/><\u002Fsvg> Generate Matchup Report<\u002Fbutton>\n    <\u002Fdiv>\n  `;\n}\n\n// ── Tab switching ────────────────────────────────────────────────────────────\nfunction switchTab(tab) {\n  activeTab = tab;\n  document.querySelectorAll('.main-tab').forEach(el => {\n    const name = el.textContent.toLowerCase().replace(/[^a-z]/g,'');\n    el.classList.toggle('active',\n      name === tab || (tab==='self' && name==='selfscout') || (tab==='matchup' && name==='matchup') || (tab==='run' && name==='singleopponentscout')\n    );\n  });\n  document.querySelectorAll('.main-pane').forEach(el => {\n    el.classList.toggle('active', el.id === `pane-${tab}`);\n  });\n  if (tab === 'games')   loadGames();\n  if (tab === 'reports') loadReports();\n}\n\n// ── Job runner ───────────────────────────────────────────────────────────────\n\nfunction appendJobLogLine(logId, fallbackEl, line) {\n  const liveEl = document.getElementById(logId) || fallbackEl;\n  if (liveEl) appendLogLine(liveEl, line);\n}\n\nfunction updateSelectedTeamSummaryCounters(summary) {\n  if (!summary || typeof summary !== 'object') return;\n\n  const setText = (id, value) => {\n    const el = document.getElementById(id);\n    if (el) el.textContent = value ?? '—';\n  };\n\n  setText('statGames', summary.games ?? summary.game_count ?? 0);\n  setText('statWins', summary.wins ?? '—');\n  setText('statLosses', summary.losses ?? '—');\n  setText('statTies', summary.ties ?? '—');\n  setText('statBatters', summary.batters ?? '—');\n\n  const lastGame = summary.last_game || summary.lastGame || null;\n  setText('statLastGame', lastGame ? new Date(`${lastGame}T12:00:00`).toLocaleDateString() : '—');\n\n  if (selectedTeam) {\n    selectedTeam.game_count = summary.games ?? summary.game_count ?? selectedTeam.game_count;\n    selectedTeam.last_game = lastGame || selectedTeam.last_game;\n    selectedTeam.stats = {\n      ...(selectedTeam.stats || {}),\n      games: summary.games ?? summary.game_count ?? selectedTeam.stats?.games,\n      wins: summary.wins ?? selectedTeam.stats?.wins,\n      losses: summary.losses ?? selectedTeam.stats?.losses,\n      ties: summary.ties ?? selectedTeam.stats?.ties,\n      batters: summary.batters ?? selectedTeam.stats?.batters,\n      plays: summary.plays ?? selectedTeam.stats?.plays,\n    };\n  }\n}\n\nasync function refreshSelectedTeamSummary() {\n  if (!selectedTeam || !selectedTeam.id) return;\n  try {\n    const res = await apiFetch(`/api/teams/${encodeURIComponent(selectedTeam.id)}/summary`);\n    const data = await res.json().catch(() => null);\n    if (!res.ok || !data || data.error) return;\n    updateSelectedTeamSummaryCounters(data);\n  } catch (err) {\n    // Keep job logs alive even if the live counter refresh has a temporary issue.\n    console.warn('[dashboard] live summary refresh failed:', err.message);\n  }\n}\n\nfunction startLiveTeamSummaryRefresh() {\n  stopLiveTeamSummaryRefresh();\n  refreshSelectedTeamSummary();\n  liveTeamSummaryTimer = setInterval(refreshSelectedTeamSummary, 5000);\n}\n\nfunction stopLiveTeamSummaryRefresh() {\n  if (liveTeamSummaryTimer) {\n    clearInterval(liveTeamSummaryTimer);\n    liveTeamSummaryTimer = null;\n  }\n}\n\nasync function runJob(type) {\n  if (!selectedTeam) return;\n\n  const logId = 'logContainer';\n  const pillId = 'jobStatusPill';\n  const labelId = 'jobLabel';\n\n  if (jobStream) { jobStream.close(); jobStream = null; }\n  currentJobType = type;\n\n  const logEl = document.getElementById(logId);\n  if (!logEl) return;\n  logEl.innerHTML = '';\n  setStatus(pillId, labelId, 'running', type);\n  setStopButtonsVisible(true);\n  startLiveTeamSummaryRefresh();\n\n  const body = { teamId: selectedTeam.id };\n  if (opts.gameLocation) body.gameLocation     = opts.gameLocation;\n  if (opts.gameDate)     body.gameDate         = opts.gameDate;\n  if (opts.gameTime)     body.gameTime         = opts.gameTime;\n  if (opts.humanObs)     body.humanObservations= opts.humanObs;\n  if (opts.gameScope)    body.gameScope        = opts.gameScope;\n  if (opts.customPrompt) body.customPrompt     = opts.customPrompt;\n\n  const endpoint = `/api/run/${type}`;\n  const res  = await apiFetch(endpoint, {\n    method: 'POST',\n    body: JSON.stringify(body),\n  });\n  const { jobId } = await res.json();\n  currentJobId = jobId;\n\n  const _token1 = getSession()?.accessToken || '';\n  jobStream = new EventSource(`/api/jobs/${jobId}/stream?token=${encodeURIComponent(_token1)}`);\n  jobStream.onmessage = e => {\n    const data = JSON.parse(e.data);\n    if (data.done) {\n      setStatus(pillId, labelId, data.status, type);\n      setStopButtonsVisible(false);\n      stopLiveTeamSummaryRefresh();\n      refreshSelectedTeamSummary();\n      currentJobId = null;\n      currentJobType = null;\n      jobStream.close();\n      if (data.status === 'done' && (type === 'report' || type === 'full-pipeline' || type === 'self-scout' || type === 'matchup')) {\n        if (activeTab === 'reports') setTimeout(loadReports, 1500);\n      }\n      return;\n    }\n    appendJobLogLine(logId, logEl, data.line);\n  };\n  jobStream.onerror = () => { appendJobLogLine(logId, logEl, '✗ Job log stream disconnected. Check Railway logs if the job is still running.'); setStatus(pillId, labelId, 'failed', type); setStopButtonsVisible(false); stopLiveTeamSummaryRefresh(); refreshSelectedTeamSummary(); if (jobStream) jobStream.close(); };\n}\n\nasync function runSelfScout() {\n  if (!selectedTeam) return;\n  if (jobStream) { jobStream.close(); jobStream = null; }\n  currentJobType = 'self-scout';\n\n  const logEl  = document.getElementById('logContainer');\n  if (!logEl) return;\n  logEl.innerHTML = '';\n  setStatus('jobStatusPill', 'jobLabel', 'running', 'self-scout');\n  setStopButtonsVisible(true);\n\n  const body = { teamId: selectedTeam.id };\n  if (opts.gameLocation) body.gameLocation      = opts.gameLocation;\n  if (opts.gameDate)     body.gameDate          = opts.gameDate;\n  if (opts.humanObs)     body.humanObservations = opts.humanObs;\n  if (opts.gameScope)    body.gameScope         = opts.gameScope;\n  if (opts.customPrompt) body.customPrompt      = opts.customPrompt;\n\n  const res = await apiFetch('/api/run/self-scout', {\n    method: 'POST',\n    body: JSON.stringify(body),\n  });\n  const { jobId: selfJobId } = await res.json();\n  currentJobId = selfJobId;\n\n  const _token2 = getSession()?.accessToken || '';\n  jobStream = new EventSource(`/api/jobs/${selfJobId}/stream?token=${encodeURIComponent(_token2)}`);\n  jobStream.onmessage = e => {\n    const data = JSON.parse(e.data);\n    if (data.done) {\n      setStatus('jobStatusPill', 'jobLabel', data.status, 'self-scout');\n      setStopButtonsVisible(false);\n      currentJobId = null;\n      currentJobType = null;\n      jobStream.close();\n      return;\n    }\n    appendJobLogLine('logContainer', logEl, data.line);\n  };\n  jobStream.onerror = () => { appendJobLogLine('logContainer', logEl, '✗ Job log stream disconnected. Check Railway logs if the job is still running.'); setStatus('jobStatusPill', 'jobLabel', 'failed', 'self-scout'); setStopButtonsVisible(false); if (jobStream) jobStream.close(); };\n}\n\nasync function runMatchup() {\n  const ourId = opts.matchupOurTeamId || document.getElementById('matchup-our')?.value || null;\n  const oppId = opts.matchupOppTeamId || document.getElementById('matchup-opp')?.value || null;\n\n  if (!ourId || !oppId) { alert('Please select both teams for the matchup report.'); return; }\n  if (String(ourId) === String(oppId)) { alert('Our team and opponent must be different teams.'); return; }\n\n  if (jobStream) { jobStream.close(); jobStream = null; }\n  currentJobType = 'matchup';\n\n  const logEl = document.getElementById('logContainer');\n  if (!logEl) return;\n  logEl.innerHTML = '';\n  setStatus('jobStatusPill', 'jobLabel', 'running', 'matchup');\n  setStopButtonsVisible(true);\n\n  // server.js's /api/run/matchup expects `teamId` for the opponent (matching\n  // every other /api/run/* route) plus an optional `ourTeamId` override.\n  const body = { teamId: oppId, ourTeamId: ourId };\n  if (opts.gameLocation)    body.gameLocation      = opts.gameLocation;\n  if (opts.gameDate)        body.gameDate          = opts.gameDate;\n  if (opts.humanObs)        body.humanObservations = opts.humanObs;\n  if (opts.matchupProbable) body.probablePitchers  = opts.matchupProbable;\n  if (opts.customPrompt)    body.customPrompt      = opts.customPrompt;\n\n  const res = await apiFetch('/api/run/matchup', {\n    method: 'POST',\n    body: JSON.stringify(body),\n  });\n  const { jobId: matchupJobId } = await res.json();\n  currentJobId = matchupJobId;\n\n  const _token3 = getSession()?.accessToken || '';\n  jobStream = new EventSource(`/api/jobs/${matchupJobId}/stream?token=${encodeURIComponent(_token3)}`);\n  jobStream.onmessage = e => {\n    const data = JSON.parse(e.data);\n    if (data.done) {\n      setStatus('jobStatusPill', 'jobLabel', data.status, 'matchup');\n      setStopButtonsVisible(false);\n      currentJobId = null;\n      currentJobType = null;\n      jobStream.close();\n      return;\n    }\n    appendJobLogLine('logContainer', logEl, data.line);\n  };\n  jobStream.onerror = () => { appendJobLogLine('logContainer', logEl, '✗ Job log stream disconnected. Check Railway logs if the job is still running.'); setStatus('jobStatusPill', 'jobLabel', 'failed', 'matchup'); setStopButtonsVisible(false); if (jobStream) jobStream.close(); };\n}\n\nfunction setStopButtonsVisible(visible) {\n  document.querySelectorAll('.stop-job-btn').forEach(btn => {\n    btn.style.display = visible ? 'inline-flex' : 'none';\n    btn.disabled = false;\n    btn.textContent = 'Stop Job';\n  });\n}\n\nfunction getCurrentJobUi() {\n  return { logId: 'logContainer', pillId: 'jobStatusPill', labelId: 'jobLabel', label: currentJobType || 'gc-scraper' };\n}\n\nasync function stopCurrentJob() {\n  if (!currentJobId) { alert('No job is currently running.'); return; }\n  const jobIdToStop = currentJobId;\n  const ui = getCurrentJobUi();\n  const logEl = document.getElementById(ui.logId);\n  document.querySelectorAll('.stop-job-btn').forEach(btn => { btn.disabled = true; btn.textContent = 'Stopping...'; });\n  if (logEl) appendLogLine(logEl, `Stop requested for job ${jobIdToStop}...`);\n\n  try {\n    // Do not use apiFetch() here. apiFetch() logs the user out on any 401.\n    // Stop Job should remain an emergency brake even if the UI token expired.\n    const session = getSession();\n    const headers = { 'Content-Type': 'application/json' };\n    if (session?.accessToken) headers.Authorization = `Bearer ${session.accessToken}`;\n\n    const res = await fetch(`/api/jobs/${jobIdToStop}/stop`, { method: 'POST', headers });\n    const data = await res.json().catch(() => ({}));\n    if (!res.ok) throw new Error(data.error || `Stop failed with HTTP ${res.status}`);\n    if (jobStream) { jobStream.close(); jobStream = null; }\n    if (logEl) appendLogLine(logEl, '✗ Job stopped by user');\n    setStatus(ui.pillId, ui.labelId, 'failed', ui.label);\n  } catch (err) {\n    if (logEl) appendLogLine(logEl, `Stop failed: ${err.message}`);\n    alert(err.message);\n  } finally {\n    currentJobId = null;\n    currentJobType = null;\n    setStopButtonsVisible(false);\n  }\n}\n\nfunction appendLogLine(container, line) {\n  const p = document.createElement('p');\n  p.className = 'log-line';\n  if (/✓|done|success|complete/i.test(line))  p.classList.add('success');\n  else if (/✗|error|fail|ERR/i.test(line))    p.classList.add('error');\n  else if (/──|step \\d/i.test(line))           p.classList.add('heading');\n  p.textContent = line;\n  container.appendChild(p);\n  container.scrollTop = container.scrollHeight;\n}\n\nfunction setStatus(pillId, labelId, status, label) {\n  const pill = document.getElementById(pillId);\n  const lbl  = document.getElementById(labelId);\n  if (!pill || !lbl) return;\n  const names = {\n    'gc-scraper': 'GC Scraper', 'pg-scraper': 'PG Scraper',\n    'reingest': 'Reingest', 'report': 'Generate Report',\n    'full-pipeline': 'Full Pipeline', 'self-scout': 'Self-Scout', 'matchup': 'Matchup',\n  };\n  lbl.textContent = names[label] || label;\n  pill.className = `status-pill status-${status}`;\n  pill.innerHTML = status === 'running'\n    ? `<span class=\"spinner\"><\u002Fspan> Running`\n    : status === 'done' ? '✓ Done' : status === 'failed' ? '✗ Failed' : 'Idle';\n  if (status === 'running') {\n    const drawer = document.getElementById('jobLogDrawer');\n    const btn = document.getElementById('jobLogToggleBtn');\n    if (drawer && !drawer.classList.contains('open')) drawer.classList.add('open');\n    if (btn) btn.textContent = 'Hide Logs';\n  }\n}\n\n// ── Load games ────────────────────────────────────────────────────────────────\nasync function loadGames() {\n  const el = document.getElementById('pane-games');\n  if (!el || !selectedTeam) return;\n\n  el.innerHTML = `<p class=\"log-empty\" style=\"color:var(--muted)\">Loading games...<\u002Fp>`;\n\n  let games;\n  try {\n    const res = await apiFetch(`/api/teams/${selectedTeam.id}/games`);\n    if (!res.ok) throw new Error(`Server returned ${res.status} — restart server.js to pick up new endpoints`);\n    games = await res.json();\n  } catch (err) {\n    el.innerHTML = `<div class=\"empty\"><div class=\"empty-icon\"><svg viewBox=\"0 0 24 24\" width=\"34\" height=\"34\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M12 3 2 20h20z\"/><path d=\"M12 10v5M12 18h.01\"/><\u002Fsvg><\u002Fdiv><h3>Could not load games<\u002Fh3><p>${escHtml(err.message)}<\u002Fp><\u002Fdiv>`;\n    return;\n  }\n\n  if (!games.length) {\n    el.innerHTML = `<div class=\"empty\"><div class=\"empty-icon\"><svg viewBox=\"0 0 24 24\" width=\"34\" height=\"34\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\"/><path d=\"M3 10h18M8 3v4M16 3v4\"/><\u002Fsvg><\u002Fdiv><h3>No games in database<\u002Fh3><p>Run the GC scraper to pull game data.<\u002Fp><\u002Fdiv>`;\n    return;\n  }\n\n  el.innerHTML = `\n    <div class=\"section-label\">${games.length} game${games.length !== 1 ? 's' : ''} in database<\u002Fdiv>\n    <div class=\"games-list\">\n      ${games.map(g => {\n        const result  = g.result || '?';\n        const score   = (g.score_us != null && g.score_them != null) ? `${g.score_us}-${g.score_them}` : '—';\n        const dateStr = g.game_date\n          ? new Date(g.game_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })\n          : '—';\n        return `\n          <div class=\"game-row\">\n            <span class=\"game-date\">${dateStr}<\u002Fspan>\n            <span class=\"game-opp\">vs ${escHtml(g.opponent_name || 'Unknown')}<\u002Fspan>\n            <span class=\"game-result ${['W','L','T'].includes(result) ? result : ''}\">${result}<\u002Fspan>\n            <span class=\"game-score\">${score}<\u002Fspan>\n            ${g.gc_game_url ? `<a class=\"game-link\" href=\"${escHtml(g.gc_game_url)}\" target=\"_blank\"><svg viewBox=\"0 0 24 24\" width=\"13\" height=\"13\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M7 17 17 7\"/><path d=\"M8 7h9v9\"/><\u002Fsvg> GC<\u002Fa>` : ''}\n          <\u002Fdiv>\n        `;\n      }).join('')}\n    <\u002Fdiv>\n  `;\n}\n\n// ── Load reports ──────────────────────────────────────────────────────────────\nasync function loadReports() {\n  const el = document.getElementById('pane-reports');\n  if (!el) return;\n\n  const res     = await apiFetch('/api/reports');\n  const reports = await res.json();\n\n  const teamSlug = (selectedTeam?.team_name || '').replace(/\\s+/g, '-').toLowerCase();\n  const filtered = reports.filter(r => r.name.toLowerCase().includes(teamSlug));\n  const all      = reports.filter(r => !filtered.includes(r));\n\n  if (!filtered.length && !all.length) {\n    el.innerHTML = `<div class=\"empty\"><div class=\"empty-icon\"><svg viewBox=\"0 0 24 24\" width=\"34\" height=\"34\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z\"/><path d=\"M14 3v5h5\"/><path d=\"M9 13h6M9 17h4\"/><\u002Fsvg><\u002Fdiv><h3>No reports yet<\u002Fh3><p>Run the pipeline to generate a scouting report.<\u002Fp><\u002Fdiv>`;\n    return;\n  }\n\n  const renderItem = r => {\n    const date = new Date(r.mtime).toLocaleDateString();\n    const size = (r.size / 1024).toFixed(0) + ' KB';\n    return `<div class=\"report-item\">\n      <span class=\"report-icon\"><svg viewBox=\"0 0 24 24\" width=\"17\" height=\"17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><rect x=\"8\" y=\"3\" width=\"8\" height=\"4\" rx=\"1\"/><path d=\"M16 5h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2\"/><\u002Fsvg><\u002Fspan>\n      <div>\n        <div class=\"report-name\">${escHtml(r.name)}<\u002Fdiv>\n        <div class=\"report-meta\">${date} · ${size}<\u002Fdiv>\n      <\u002Fdiv>\n      <a class=\"report-dl\" href=\"/reports/${encodeURIComponent(r.name)}\" download>Download<\u002Fa>\n    <\u002Fdiv>`;\n  };\n\n  el.innerHTML =\n    (filtered.length ? `<div class=\"section-label\">This Team<\u002Fdiv><div class=\"reports-list\">${filtered.map(renderItem).join('')}<\u002Fdiv>` : '') +\n    (all.length ? `<div class=\"section-label\" style=\"margin-top:16px\">All Reports<\u002Fdiv><div class=\"reports-list\">${all.map(renderItem).join('')}<\u002Fdiv>` : '');\n}\n\n// ── Utility ───────────────────────────────────────────────────────────────────\nfunction escHtml(s) {\n  return String(s||'').replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');\n}\n\n// ── Add Team Modal ────────────────────────────────────────────────────────────\nfunction showAddTeam() {\n  document.getElementById('addTeamModal').style.display = 'flex';\n  document.getElementById('addName').focus();\n  document.getElementById('addTeamError').style.display = 'none';\n}\nfunction hideAddTeam() {\n  document.getElementById('addTeamModal').style.display    = 'none';\n  document.getElementById('addName').value                 = '';\n  document.getElementById('addGcUrl').value                = '';\n  document.getElementById('addPgUrl').value                = '';\n  document.getElementById('addSheetUrl').value             = '';\n  document.getElementById('replaceAllTeams').checked       = false;\n  document.getElementById('addTeamError').style.display    = 'none';\n  document.getElementById('sheetSyncResult').style.display = 'none';\n  switchAddTab('manual');\n}\nfunction switchAddTab(tab) {\n  document.getElementById('paneManual').style.display = tab === 'manual' ? 'block' : 'none';\n  document.getElementById('paneSheet').style.display  = tab === 'sheet'  ? 'block' : 'none';\n  const m = document.getElementById('tabManual'), s = document.getElementById('tabSheet');\n  m.style.borderBottomColor = tab === 'manual' ? 'var(--accent)' : 'transparent';\n  m.style.color             = tab === 'manual' ? 'var(--accent)' : 'var(--muted)';\n  s.style.borderBottomColor = tab === 'sheet'  ? 'var(--accent)' : 'transparent';\n  s.style.color             = tab === 'sheet'  ? 'var(--accent)' : 'var(--muted)';\n  document.getElementById('addTeamError').style.display = 'none';\n}\nasync function submitAddTeam() {\n  const teamName = document.getElementById('addName').value.trim();\n  const errEl    = document.getElementById('addTeamError');\n  if (!teamName) { errEl.textContent = 'Team name is required.'; errEl.style.display = 'block'; return; }\n  const res  = await apiFetch('/api/teams/add', {\n    method: 'POST',\n    body: JSON.stringify({ teamName, gcTeamUrl: document.getElementById('addGcUrl').value.trim(), pgTeamUrl: document.getElementById('addPgUrl').value.trim() }),\n  });\n  const data = await res.json();\n  if (!res.ok) { errEl.textContent = data.error || 'Failed.'; errEl.style.display = 'block'; return; }\n  hideAddTeam();\n  await loadTeams();\n}\nasync function submitSyncSheet() {\n  const csvUrl   = document.getElementById('addSheetUrl').value.trim();\n  const replace  = document.getElementById('replaceAllTeams').checked;\n  const resultEl = document.getElementById('sheetSyncResult');\n  const btn      = document.getElementById('syncSheetBtn');\n  const errEl    = document.getElementById('addTeamError');\n  errEl.style.display = resultEl.style.display = 'none';\n  if (!csvUrl) { errEl.textContent = 'Please paste a published CSV URL.'; errEl.style.display = 'block'; return; }\n  btn.disabled = true; btn.textContent = 'Syncing...';\n  try {\n    const res  = await apiFetch('/api/settings/sheet', {\n      method: 'POST',\n      body: JSON.stringify({ csvUrl, replace }),\n    });\n    const data = await res.json();\n    if (!res.ok) { errEl.textContent = data.error || 'Sync failed.'; errEl.style.display = 'block'; return; }\n    resultEl.style.color      = '#2ecc71';\n    resultEl.textContent      = `✓ ${data.message}`;\n    resultEl.style.display    = 'block';\n    setTimeout(async () => { hideAddTeam(); await loadTeams(); }, 1500);\n  } catch (err) {\n    errEl.textContent = err.message; errEl.style.display = 'block';\n  } finally {\n    btn.disabled = false; btn.textContent = 'Sync Sheet';\n  }\n}\n\n// ── Edit / Remove Opponent ───────────────────────────────────────────────────\nfunction showEditTeam(teamId) {\n  const team = allTeams.find(t => String(t.id) === String(teamId));\n  if (!team) { alert('Opponent not found. Refresh the list and try again.'); return; }\n  document.getElementById('editTeamId').value = team.id;\n  document.getElementById('editName').value   = team.team_name || '';\n  document.getElementById('editGcUrl').value  = team.gc_team_url || '';\n  document.getElementById('editPgUrl').value  = team.pg_team_url || '';\n  document.getElementById('editTeamError').style.display = 'none';\n  document.getElementById('editTeamModal').style.display = 'flex';\n  document.getElementById('editName').focus();\n}\n\nfunction hideEditTeam() {\n  document.getElementById('editTeamModal').style.display = 'none';\n  document.getElementById('editTeamError').style.display = 'none';\n}\n\nasync function submitEditTeam() {\n  const teamId = document.getElementById('editTeamId').value;\n  const teamName = document.getElementById('editName').value.trim();\n  const gcTeamUrl = document.getElementById('editGcUrl').value.trim();\n  const pgTeamUrl = document.getElementById('editPgUrl').value.trim();\n  const errEl = document.getElementById('editTeamError');\n\n  if (!teamName) { errEl.textContent = 'Team name is required.'; errEl.style.display = 'block'; return; }\n\n  const res = await apiFetch(`/api/teams/${teamId}`, {\n    method: 'PUT',\n    body: JSON.stringify({ teamName, gcTeamUrl, pgTeamUrl }),\n  });\n  const data = await res.json().catch(() => ({}));\n  if (!res.ok) { errEl.textContent = data.error || 'Failed to update opponent.'; errEl.style.display = 'block'; return; }\n\n  hideEditTeam();\n  await loadTeams();\n  selectTeamById(teamId);\n}\n\nasync function removeOpponent(teamId) {\n  const team = allTeams.find(t => String(t.id) === String(teamId));\n  if (!team) { alert('Opponent not found. Refresh the list and try again.'); return; }\n\n  const ok = confirm(`Remove \"${team.team_name}\" from your opponent list?\n\nThis just hides them from the list — all games and stats stay in the database, and you can bring them back later.`);\n  if (!ok) return;\n\n  const res = await apiFetch(`/api/teams/${teamId}/archive`, {\n    method: 'PATCH',\n    body: JSON.stringify({ archived: true }),\n  });\n  const data = await res.json().catch(() => ({}));\n  if (!res.ok) { alert(data.error || 'Failed to remove opponent.'); return; }\n\n  if (selectedTeam && String(selectedTeam.id) === String(teamId)) {\n    selectedTeam = null;\n    document.getElementById('mainPanel').innerHTML = `<div class=\"empty empty-hero\"><div class=\"empty-icon\"><svg viewBox=\"0 0 24 24\" width=\"34\" height=\"34\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9\"/><circle cx=\"12\" cy=\"12\" r=\"4.5\"/><circle cx=\"12\" cy=\"12\" r=\"0.9\" fill=\"currentColor\"/><\u002Fsvg><\u002Fdiv><h3>Select a team to get started<\u002Fh3><p>Choose a team from the list on the left<\u002Fp><\u002Fdiv>`;\n  }\n\n  await loadTeams();\n}\n\n// ── Billing ──────────────────────────────────────────────────────────────────\nconst PLAN_LABELS = { free: 'Free', coach: 'Coach', organization: 'Organization' };\n\nfunction openBilling(noticeHtml = '') {\n  document.getElementById('billingModal').style.display = 'flex';\n  loadBillingStatus(noticeHtml);\n}\nfunction closeBilling() {\n  document.getElementById('billingModal').style.display = 'none';\n}\n\nasync function loadBillingStatus(noticeHtml = '') {\n  const el = document.getElementById('billingContent');\n  el.innerHTML = 'Loading…';\n  try {\n    const res  = await apiFetch('/api/billing/status');\n    const data = await res.json();\n    if (!res.ok) { el.innerHTML = `<div style=\"color:#e74c3c\">${escHtml(data.error || 'Failed to load billing status.')}<\u002Fdiv>`; return; }\n\n    const expires = data.planExpiresAt ? new Date(data.planExpiresAt).toLocaleDateString() : null;\n    const statusLine = data.subscriptionStatus\n      ? `<div style=\"color:var(--muted);font-size:12px;margin-top:2px\">Status: ${escHtml(data.subscriptionStatus)}${expires ? ` · renews ${expires}` : ''}<\u002Fdiv>`\n      : '';\n\n    let actionsHtml;\n    if (data.canManageBilling) {\n      actionsHtml = `\n        <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em\">Upgrade<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px\">\n            <button class=\"btn btn-outline\" onclick=\"startCheckout('coach','month')\">Coach — $49/mo<\u002Fbutton>\n            <button class=\"btn btn-outline\" onclick=\"startCheckout('coach','year')\">Coach — $490/yr<\u002Fbutton>\n            <button class=\"btn btn-outline\" onclick=\"startCheckout('organization','month')\">Organization — $199/mo<\u002Fbutton>\n            <button class=\"btn btn-outline\" onclick=\"startCheckout('organization','year')\">Organization — $1990/yr<\u002Fbutton>\n          <\u002Fdiv>\n          ${data.hasBillingAccount ? `<button class=\"btn btn-primary\" style=\"margin-top:8px\" onclick=\"openBillingPortal()\">Manage Billing / Cancel<\u002Fbutton>` : ''}\n        <\u002Fdiv>`;\n    } else {\n      actionsHtml = `<div style=\"color:var(--muted);font-size:12px;margin-top:14px\">Only an organization admin can change plans or manage billing.<\u002Fdiv>`;\n    }\n\n    const fmtLimit = (max) => (max >= 999999 ? 'Unlimited' : String(max));\n    const fmtUsage = (used, max) => (max >= 999999 ? 'Unlimited' : `${used} / ${max}`);\n    const usageRow = (label, used, max) => `\n      <div style=\"display:flex;justify-content:space-between;font-size:12px;color:var(--text);padding:4px 0\">\n        <span style=\"color:var(--muted)\">${label}<\u002Fspan>\n        <span>${fmtUsage(used, max)}<\u002Fspan>\n      <\u002Fdiv>`;\n\n    const reportPeriodLabel = data.reportLimitsAreLifetime ? 'lifetime' : 'this month';\n\n    el.innerHTML = `\n      ${noticeHtml}\n      <div style=\"font-size:18px;font-weight:700\">${escHtml(PLAN_LABELS[data.plan] || data.plan)} plan<\u002Fdiv>\n      ${statusLine}\n      <div style=\"margin-top:12px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:2px 0\">\n        ${usageRow('Opponent teams', data.usage.opponentTeams, data.limits.maxOpponentTeams)}\n        ${usageRow(`Scouting reports (${reportPeriodLabel})`, data.usage.scoutingReportsThisMonth, data.limits.maxReportsPerMonth)}\n        ${usageRow(`Self-scout reports (${reportPeriodLabel})`, data.usage.selfScoutReportsThisMonth, data.limits.maxSelfScoutReportsPerMonth)}\n        ${usageRow(`Matchup reports (${reportPeriodLabel})`, data.usage.matchupReportsThisMonth, data.limits.maxMatchupReportsPerMonth)}\n        ${usageRow('Users', data.usage.userCount, data.limits.maxUsers)}\n      <\u002Fdiv>\n      ${actionsHtml}\n      <div id=\"billingError\" style=\"color:#e74c3c;font-size:11px;margin-top:10px;display:none\"><\u002Fdiv>\n    `;\n  } catch (err) {\n    el.innerHTML = `<div style=\"color:#e74c3c\">${escHtml(err.message)}<\u002Fdiv>`;\n  }\n}\n\nasync function startCheckout(tier, interval) {\n  const errEl = document.getElementById('billingError');\n  try {\n    const res  = await apiFetch('/api/billing/create-checkout-session', {\n      method: 'POST',\n      body: JSON.stringify({ tier, interval }),\n    });\n    const data = await res.json();\n    if (!res.ok) throw new Error(data.error || 'Failed to start checkout.');\n    window.location.href = data.url;\n  } catch (err) {\n    if (errEl) { errEl.textContent = err.message; errEl.style.display = 'block'; }\n  }\n}\n\nasync function openBillingPortal() {\n  const errEl = document.getElementById('billingError');\n  try {\n    const res  = await apiFetch('/api/billing/create-portal-session', { method: 'POST' });\n    const data = await res.json();\n    if (!res.ok) throw new Error(data.error || 'Failed to open billing portal.');\n    window.location.href = data.url;\n  } catch (err) {\n    if (errEl) { errEl.textContent = err.message; errEl.style.display = 'block'; }\n  }\n}\n\n\n// ── Init ──────────────────────────────────────────────────────────────────────\n(function init() {\n  // Supabase password-recovery links land here with tokens in the URL hash\n  // (e.g. #access_token=...&type=recovery). Intercept before anything else.\n  const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));\n  if (hashParams.get('type') === 'recovery' && hashParams.get('access_token')) {\n    const token = hashParams.get('access_token');\n    history.replaceState({}, '', window.location.pathname + window.location.search);\n    showResetPassword(token);\n    return;\n  }\n\n  if (DESIGN_MODE) {\n    const designUser = {\n      id: 'design-preview',\n      email: 'design-preview@jobuscout.local'\n    };\n    showDashboard(designUser);\n    loadTeams();\n    return;\n  }\n\n  const session = getSession();\n  if (session?.accessToken) {\n    // Already logged in — go straight to dashboard\n    showDashboard(session.user);\n    loadTeams();\n\n    const billingParam = new URLSearchParams(window.location.search).get('billing');\n    if (billingParam) {\n      history.replaceState({}, '', window.location.pathname);\n      const notice = billingParam === 'success'\n        ? '<div style=\"background:rgba(46,204,113,0.12);border:1px solid #2ecc71;color:#2ecc71;padding:8px 10px;border-radius:4px;font-size:12px;margin-bottom:12px\">Subscription updated successfully.<\u002Fdiv>'\n        : '<div style=\"background:rgba(231,76,60,0.12);border:1px solid #e74c3c;color:#e74c3c;padding:8px 10px;border-radius:4px;font-size:12px;margin-bottom:12px\">Checkout was canceled.<\u002Fdiv>';\n      openBilling(notice);\n    }\n  } else {\n    // Deep link from the marketing site, e.g. /?signup=1&tier=coach&interval=year\n    const searchParams = new URLSearchParams(window.location.search);\n    if (searchParams.get('signup')) {\n      const tier = searchParams.get('tier');\n      const interval = searchParams.get('interval');\n      history.replaceState({}, '', window.location.pathname);\n      showSignup({ tier, interval });\n      setTimeout(() => document.getElementById('signupOrgName')?.focus(), 100);\n      return;\n    }\n\n    // Show login screen, focus email field\n    showLogin();\n    setTimeout(() => document.getElementById('loginEmail')?.focus(), 100);\n  }\n})();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
