  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

33044;\n    --text:   #ece7da;\n    --muted:  #7d8799;\n    --font-body: 'Inter', system-ui, sans-serif;\n    --font-display: 'Oswald', sans-serif;\n    --font-wordmark: 'Bebas Neue', sans-serif;\n    --font-mono: 'JetBrains Mono', ui-monospace, monospace;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    background: var(--navy);\n    color: var(--text);\n    font-family: var(--font-body);\n    font-size: 14px;\n    min-height: 100vh;\n    color-scheme: dark;\n  }\n\n  /* ── Header ── */\n  header {\n    background: var(--blue);\n    border-bottom: 2px solid var(--accent);\n    padding: 0 24px;\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    height: 56px;\n    flex-shrink: 0;\n  }\n  .sidebar-toggle-btn {\n    background: none; border: 1px solid var(--border); color: var(--muted);\n    width: 28px; height: 28px; border-radius: 5px; cursor: pointer;\n    display: flex; align-items: center; justify-content: center; flex-shrink: 0;\n    margin-left: 4px; transition: all 0.15s;\n  }\n  .sidebar-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }\n  .logo { font-family: var(--font-wordmark); font-size: 27px; font-weight: 400; letter-spacing: 0.06em; color: var(--white); text-transform: uppercase; }\n  .logo span { color: var(--accent); }\n  .header-sub {\n    font-family: var(--font-mono);\n    font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;\n    border-left: 1px solid var(--border); padding-left: 16px; margin-left: 4px;\n  }\n  .header-status { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }\n  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }\n\n  /* ── Layout ── */\n  .layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 56px); overflow: hidden; transition: grid-template-columns 0.18s ease; }\n  .layout.sidebar-collapsed { grid-template-columns: 0px 1fr; }\n\n  /* ── Sidebar ── */\n  .sidebar { background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-width: 0; }\n  .layout.sidebar-collapsed .sidebar { border-right: none; opacity: 0; }\n  .sidebar-header {\n    padding: 14px 16px; border-bottom: 1px solid var(--border);\n    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;\n  }\n  .sidebar-header h2 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 500; }\n  .refresh-btn {\n    background: none; border: 1px solid var(--border); color: var(--muted);\n    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.15s;\n  }\n  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }\n\n  .team-list { overflow-y: auto; flex: 1; }\n  .team-item {\n    padding: 11px 16px; border-bottom: 1px solid var(--border);\n    cursor: pointer; transition: background 0.1s; position: relative;\n  }\n  .team-item:hover { background: rgba(255,255,255,0.03); }\n  .team-item.active { background: rgba(196,59,50,0.10); border-left: 3px solid var(--red); }\n  .team-name { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 5px; }\n  .team-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }\n\n  .badge {\n    font-family: var(--font-mono);\n    font-size: 11px; padding: 2px 6px; border-radius: 4px;\n    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;\n  }\n  .badge-games { background: rgba(26,58,92,0.8); color: var(--gray); }\n  .badge-gc    { background: rgba(39,174,96,0.15); color: var(--green); }\n  .badge-pg    { background: rgba(200,168,75,0.15); color: var(--accent); }\n  .badge-wins  { background: rgba(39,174,96,0.15); color: var(--green); }\n  .badge-year   { background: rgba(26,58,92,0.8); color: var(--gray); }\n  .badge-season { background: rgba(200,168,75,0.15); color: var(--accent); }\n\n  /* ── Main panel ── */\n  .main { display: flex; flex-direction: column; overflow: hidden; }\n\n  /* ── Team header ── */\n  .team-panel { padding: 24px 32px 20px; flex-shrink: 0; }\n  .team-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--white); text-transform: uppercase; letter-spacing: 0; margin-bottom: 8px; }\n  .team-summary {\n    font-family: var(--font-mono); font-size: 12px; color: var(--text);\n    display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 12px;\n  }\n  .team-summary .dot-sep { color: var(--muted); }\n  .team-summary .ok { color: var(--green); }\n  .team-summary .warn { color: var(--muted); }\n  .team-urls { display: flex; gap: 14px; flex-wrap: wrap; }\n  .url-link { font-size: 11px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 4px; }\n  .url-link:hover { color: var(--accent); }\n\n  /* ── Tab nav ── */\n  .main-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 32px; background: var(--card); flex-shrink: 0; }\n  .main-tab {\n    font-family: var(--font-mono);\n    padding: 12px 16px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em;\n    text-transform: uppercase; color: var(--muted); cursor: pointer;\n    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;\n  }\n  .main-tab.active { color: var(--white); border-bottom-color: var(--red); }\n  .main-tab:hover:not(.active) { color: var(--text); }\n\n  /* ── Main content area ── */\n  .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; }\n  .main-pane { display: none; padding: 24px 32px; }\n  .main-pane.active { display: block; }\n\n  /* ── Run Panel ── */\n  .run-section { margin-bottom: 24px; }\n  .section-label {\n    font-family: var(--font-mono);\n    font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;\n    color: var(--accent); font-weight: 500; margin-bottom: 10px;\n  }\n\n  /* ── Options grid ── */\n  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }\n  .opt-group { display: flex; flex-direction: column; gap: 4px; }\n  .opt-group label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }\n  .opt-input {\n    background: var(--navy); border: 1px solid var(--border); color: var(--text);\n    padding: 7px 10px; border-radius: 5px; font-size: 12px; font-family: inherit;\n    transition: border-color 0.15s;\n  }\n  .opt-input:focus { outline: none; border-color: var(--red); }\n  /* Native date/time inputs render their calendar/clock icon black by\n     default, which disappears against the dark field. Setting color-scheme\n     to dark tells the browser to draw its own native controls (including\n     that icon) in a light color to match — this alone is enough; do NOT\n     also add a CSS filter on ::-webkit-calendar-picker-indicator, since that\n     would invert the icon a second time and flip it back to dark. */\n  .opt-input[type=\"date\"], .opt-input[type=\"time\"] { color-scheme: dark; }\n  .opt-select {\n    background: var(--navy); border: 1px solid var(--border); color: var(--text);\n    padding: 7px 10px; border-radius: 5px; font-size: 12px; font-family: inherit;\n    cursor: pointer; transition: border-color 0.15s;\n  }\n  .opt-select:focus { outline: none; border-color: var(--red); }\n\n  .obs-group { margin-bottom: 10px; }\n  .obs-group label { display: block; font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }\n  .obs-textarea {\n    width: 100%; background: var(--navy); border: 1px solid var(--border); color: var(--text);\n    padding: 8px 10px; border-radius: 5px; font-size: 12px; font-family: inherit;\n    resize: vertical; min-height: 72px; transition: border-color 0.15s;\n  }\n  .obs-textarea:focus { outline: none; border-color: var(--red); }\n  .obs-textarea::placeholder { color: var(--muted); }\n\n  /* ── Action buttons ── */\n  .actions { display: flex; gap: 8px; padding-bottom: 12px; flex-wrap: wrap; align-items: center; }\n  .actions-hierarchy { align-items: center; }\n  .actions-divider { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }\n  .btn {\n    padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer;\n    font-family: var(--font-mono);\n    font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;\n    transition: all 0.15s; display: flex; align-items: center; gap: 5px;\n  }\n  .btn:disabled { opacity: 0.35; cursor: not-allowed; }\n  .btn-primary  { background: var(--red); color: #fff; }\n  .btn-primary:hover:not(:disabled)  { background: var(--red-hover); }\n  .btn-secondary { background: rgba(200,168,75,0.14); color: var(--accent); }\n  .btn-secondary:hover:not(:disabled) { background: rgba(200,168,75,0.24); }\n  .btn-utility  { background: transparent; color: var(--muted); padding: 8px 12px; font-size: 11px; }\n  .btn-utility:hover:not(:disabled)  { color: var(--text); background: rgba(255,255,255,0.05); }\n  .btn-outline  { background: transparent; border: 1px solid var(--border); color: var(--text); }\n  .btn-outline:hover:not(:disabled)  { border-color: var(--accent); color: var(--accent); }\n  .btn-danger   { background: transparent; border: 1px solid rgba(192,57,43,0.4); color: #e74c3c; }\n  .btn-danger:hover:not(:disabled)   { background: rgba(192,57,43,0.1); }\n  .btn-scout    { background: rgba(39,174,96,0.12); border: 1px solid rgba(39,174,96,0.3); color: var(--green); }\n  .btn-scout:hover:not(:disabled)    { background: rgba(39,174,96,0.2); }\n  .btn-matchup  { background: rgba(200,168,75,0.12); border: 1px solid rgba(200,168,75,0.3); color: var(--accent); }\n  .btn-matchup:hover:not(:disabled)  { background: rgba(200,168,75,0.2); }\n\n  /* ── Dropdown menus (team kebab + pipeline \"More\") ── */\n  .dropdown-wrap { position: relative; }\n  .dropdown-menu {\n    display: none; position: absolute; top: calc(100% + 4px); right: 0; z-index: 20;\n    background: var(--panel); border: 1px solid var(--line-strong); border-radius: 8px;\n    padding: 5px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);\n  }\n  .dropdown-menu.open { display: flex; flex-direction: column; gap: 1px; }\n  .dropdown-item {\n    background: none; border: none; color: var(--text); text-align: left;\n    font-size: 12px; font-family: var(--font-body); padding: 7px 10px; border-radius: 5px; cursor: pointer;\n  }\n  .dropdown-item:hover { background: rgba(255,255,255,0.06); }\n  .dropdown-item.danger { color: #ff8a80; }\n  .dropdown-item.danger:hover { background: rgba(192,57,43,0.12); }\n\n  /* ── Job log ── */\n  .log-container {\n    background: #0a1320; border-radius: 8px;\n    padding: 12px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6;\n    height: 260px; overflow-y: auto; color: #a8c0d8; margin-top: 10px;\n  }\n  .log-line { margin: 0; white-space: pre-wrap; word-break: break-all; }\n  .log-line.success { color: #2ecc71; }\n  .log-line.error   { color: #e74c3c; }\n  .log-line.heading { color: var(--accent); font-weight: bold; }\n  .log-empty { color: var(--muted); font-style: italic; }\n\n  .job-log-bar {\n    display: flex; align-items: center; gap: 10px; font-size: 12px;\n    background: var(--card); border-radius: 8px; padding: 10px 14px;\n  }\n  .job-log-drawer { max-height: 0; overflow: hidden; transition: max-height 0.2s ease; }\n  .job-log-drawer.open { max-height: 320px; }\n  .status-pill {\n    padding: 2px 10px; border-radius: 12px; font-size: 11px;\n    font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;\n  }\n  .status-running { background: rgba(200,168,75,0.2); color: var(--accent); }\n  .status-done    { background: rgba(39,174,96,0.2);  color: var(--green); }\n  .status-failed  { background: rgba(192,57,43,0.2);  color: #e74c3c; }\n  .status-idle    { background: rgba(138,155,176,0.1); color: var(--muted); }\n  .spinner {\n    width: 11px; height: 11px; border: 2px solid rgba(200,168,75,0.3);\n    border-top-color: var(--accent); border-radius: 50%;\n    animation: spin 0.8s linear infinite; display: inline-block;\n  }\n  @keyframes spin { to { transform: rotate(360deg); } }\n\n\n  .team-row-main { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }\n  .team-actions { position: relative; }\n  .team-kebab-btn {\n    border:none; background:transparent; color:var(--muted);\n    border-radius:4px; width:22px; height:20px; font-size:14px; cursor:pointer; line-height:1;\n    opacity: .6; transition: all 0.15s;\n  }\n  .team-item:hover .team-kebab-btn { opacity: 1; }\n  .team-kebab-btn:hover { color: var(--accent); background: rgba(255,255,255,0.06); }\n  .stop-job-btn { display:none!important; margin-left:auto; border-color:var(--red)!important; color:#ff8a80!important; }\n\n  /* ── Reports list ── */\n  .reports-list { display: flex; flex-direction: column; gap: 8px; }\n  .report-item {\n    display: flex; align-items: center; gap: 10px;\n    background: var(--card); border-radius: 8px; padding: 11px 14px;\n  }\n  .report-icon { font-size: 18px; }\n  .report-name { font-size: 12px; font-weight: 600; color: var(--text); }\n  .report-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }\n  .report-dl {\n    margin-left: auto; background: var(--red); color: #fff;\n    border: none; padding: 6px 13px; border-radius: 5px; font-size: 11px;\n    font-family: var(--font-mono);\n    font-weight: 600; cursor: pointer; text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase;\n  }\n  .report-dl:hover { background: var(--red-hover); }\n\n  /* ── Games list ── */\n  .games-list { display: flex; flex-direction: column; gap: 6px; }\n  .game-row {\n    display: flex; align-items: center; gap: 10px;\n    background: var(--card);\n    border-radius: 8px; padding: 9px 14px; font-size: 12px;\n  }\n  .game-date { color: var(--muted); font-family: var(--font-mono); font-size: 11px; min-width: 88px; }\n  .game-opp  { flex: 1; font-weight: 600; color: var(--text); }\n  .game-result {\n    font-weight: 800; font-size: 12px; padding: 2px 8px; border-radius: 3px; letter-spacing: 0.04em;\n  }\n  .game-result.W { background: rgba(39,174,96,0.15); color: var(--green); }\n  .game-result.L { background: rgba(192,57,43,0.15); color: #e74c3c; }\n  .game-result.T { background: rgba(138,155,176,0.1); color: var(--muted); }\n  .game-score { color: var(--muted); font-family: var(--font-mono); font-size: 11px; min-width: 50px; text-align: right; }\n  .game-link { color: var(--muted); font-size: 11px; text-decoration: none; }\n  .game-link:hover { color: var(--accent); }\n\n  /* ── Matchup panel ── */\n  .matchup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }\n  .matchup-team-box {\n    background: var(--card); border-radius: 8px; padding: 14px;\n  }\n  .matchup-team-box label { display: block; font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }\n  .team-select-wrap { position: relative; }\n  .team-select-wrap select {\n    width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text);\n    padding: 8px 10px; border-radius: 5px; font-size: 12px; font-family: inherit;\n    cursor: pointer; appearance: none;\n  }\n  .team-select-wrap select:focus { outline: none; border-color: var(--accent); }\n\n  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }\n\n  /* ── Empty state ── */\n  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }\n  /* Welcome hero (shown only on the main panel before a team is picked) */\n  .empty-hero {\n    position: relative;\n    align-self: stretch;\n    margin: 0 !important;\n    display: flex; flex-directi m: 5px;\n  }\n  .login-field input {\n    width: 100%; background: var(--navy); border: 1px solid var(--border);\n    color: var(--text); padding: 9px 12px; border-radius: 5px;\n    font-size: 13px; font-family: inherit; transition: border-color 0.15s;\n  }\n  .login-field input:focus { outline: none; border-color: var(--red); }\n  .login-btn {\n    width: 100%; background: var(--red); color: #fff;\n    border: none; padding: 11px; border-radius: 6px; font-size: 12px;\n    font-family: var(--font-mono);\n    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;\n    cursor: pointer; margin-top: 8px; transition: background 0.15s;\n  }\n  .login-btn:hover { background: var(--red-hover); }\n  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }\n  .login-error {\n    color: #e74c3c; font-size: 12px; margin-top: 12px;\n    display: none; text-align: center;\n  }\n\n  /* ── User badge in header ── */\n  .user-badge {\n    display: flex; align-items: center; gap: 8px;\n    font-size: 12px; color: var(--muted);\n  }\n  .logout-btn {\n    background: none; border: 1px solid var(--border); color: var(--muted);\n    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;\n    transition: all 0.15s;\n  }\n  .logout-btn:hover { border-color: #e74c3c; color: #e74c3c; }\n\n  /* ── Self-scout note ── */\n  .mode-notice {\n    background: rgba(39,174,96,0.08); border: 1px solid rgba(39,174,96,0.2);\n    border-radius: 5px; padding: 8px 12px; font-size: 11px; color: var(--green);\n    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;\n  }\n  .mode-notice.matchup-notice {\n    background: rgba(200,168,75,0.08); border-color: rgba(200,168,75,0.2); color: var(--accent);\n  }\n\n  .login-idol { width:72px; height:72px; object-fit:contain; display:block; order:2; flex-shrink:0; }\n  .login-head { display:flex; align-items:center; justify-content:space-between; gap:18px; margin-bottom:26px; }\n  .login-head-text { order:1; }\n  .login-head-text .login-sub { margin-bottom:0; }\n  .empty-icon { line-height:0; margin-bottom:12px; color:var(--muted); }\n  .empty-icon svg { display:inline-block; }\n  .report-icon { color:var(--accent); display:inline-flex; align-items:center; }\n  .refresh-btn { display:inline-flex; align-items:center; gap:5px; }\n  .game-link { display:inline-flex; align-items:center; gap:4px; }\n  .url-link svg, .btn svg, .mode-notice svg { flex-shrink:0; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ── Login Screen ─────────────────────────────────────────────────────── -->\n<div id=\"loginScreen\">\n  <div class=\"login-card\">\n    <div class=\"login-head\">\n    <img class=\"login-idol\" src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAN0AAAEACAYAAAA3E3NfAAAQAElEQVR4Aex9BaBVRdf2s/a5xaW7Q7FFEFSw87U7sQVbGqRBSlFSQkBCQgwUAwO7sFtREFQUCenuW2fv/3lmn3PuuRdQQPT1/X72nbXXmjVr1uSamT2zz74e9l3/p2ogCAIj7Ee4h/AU4UlCB0Itgv2fKuz/aGH2Gd3/aMP9QbbLM+xxQi9CY8I1hAcIUwlH0vAqE8oSUgn7jJCV8k+7fUb3T9f435gejSiV6ocSjiUkt22E/qMJbxI+IEwn9CYcQtjn/uEaSG6Yfzjpfcn9DTVQjTovIbh2DQIfQRDQK4CWneXoOYDQiNCJ8CbDryCkkN7n/qEacI3zD6W1L5m/vwZKMQnNdkTA0qXL8MnHn8P3ndHBLLGaFKG2r0pBLUWH0fAOIIhP1g7dPuZeqgFV/F5StU/Nv6AGCrTn2rUb0ff+wViwYLGb8ULjCxwdy6uMLJ3Gdjv9zxPOIF1AB3n73F6ugX0VvJcr9L+ljsYiAyrG9IWJABGbNmzFg4NHIi8vD4CPL7/4Bk9NeRYrlq+k8fnkAWaWwvhHAJgE4FrS6cT73N9UA/uM7m+q2P+S2hpMV7ZGgwqQk5uL7OwcfP/dHKxetcYFHXTwgTS8b9GmdRe8+eYMRKMJw2M4qtDghpHQcUNJ4n3ub6iBfUb3N1Tqf0ml2vIQGo0zOuVh3dr1yNqWhbycPKxes5YzmoeSJUugV58uWLN6LTrc3YOz4Ahs3brNGSnjcNKzMtTRkXQ34gzifW4v14Aaai+r/Lep+/8mPxm+79dWaWksQvhu5mwaE8CnOOTmankZbqgUL14M3e5pj8wimZg86Rl07NATixcvoWwYTstLpYIWhL7UVZJ4n9uLNbDP6PZiZf6XVRXzPG+/eB50UvDJp1/QkGh09PjRaDyIM56h3pF1cMihBzneB+9/httuaYVff5mP/CsoQoNrRX934iLE+9xeqoF9RreXKvJfoEbHBTwCCNzycu3adfjpx19ctmhzfHbLNzoxS5QogcPrHMxZEO5IYdmy1WjXrgdmfvs9DVUzntE4wfO74DbKN6HhkSa1z/3lGthndH+5Cv81Cg5gTnj4bc5oZn5D4+H5XMADctC08vIKGp3nGRo0qAtKM1pAo/Tx2/zF6NrlPhrrPBqiTz2MGaAkddxLofODIDRo0vvcX6iBfUb3Fyrv3xI1ZgynE3OrX7MU8N13s2HmgUtOkE8jKmh0ynvduofDi3BGg8Ezcxa2ePF "dot\" id=\"serverDot\"><\u002Fdiv>\n    <span id=\"serverStatus\">Connected<\u002Fspan>\n    <div class=\"user-badge\" id=\"userBadge\" style=\"display:none\">\n      <span id=\"userEmail\" style=\"border-left:1px solid var(--border);padding-left:8px\"><\u002Fspan>\n      <button class=\"refresh-btn\" id=\"adminPanelBtn\" onclick=\"window.location.href='/admin'\" style=\"display:none\" title=\"Jobu Scout platform administration\">Admin Panel<\u002Fbutton>\n      <button class=\"refresh-btn\" onclick=\"openBilling()\">Billing<\u002Fbutton>\n      <button class=\"logout-btn\" onclick=\"logout()\">Sign Out<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ── Support-view banner (only shown while an admin support session is active) ── -->\n<div id=\"supportSessionBanner\" style=\"display:none;position:sticky;top:0;z-index:150;background:#3a2a10;border-bottom:1px solid var(--accent);color:var(--light);padding:8px 16px;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px\">\n  <strong style=\"color:var(--accent)\">Support View<\u002Fstrong>\n  <span id=\"supportSessionText\"><\u002Fspan>\n  <span style=\"margin-left:auto;display:flex;gap:8px;flex-wrap:wrap\">\n    <button class=\"refresh-btn\" onclick=\"window.location.href='/admin'\">Return to Admin<\u002Fbutton>\n    <button class=\"logout-btn\" onclick=\"endSupportSessionView()\">End Support Session<\u002Fbutton>\n  <\u002Fspan>\n<\u002Fdiv>\n\n<div class=\"layout\" id=\"appLayout\">\n\n  <!-- Sidebar -->\n  <div class=\"sidebar\" id=\"appSidebar\">\n    <div class=\"sidebar-header\">\n      <h2>My Team<\u002Fh2>\n      <div style=\"display:flex;gap:6px\">\n        <button class=\"refresh-btn\" onclick=\"renderMyTeams()\"><svg viewBox=\"0 0 24 24\" width=\"12\" height=\"12\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v5h-5\"><\u002Fpath><\u002Fsvg> Refresh<\u002Fbutton>\n        <button class=\"refresh-btn\" onclick=\"showMyTeam()\" style=\"border-color:var(--accent);color:var(--accent)\">+ Add<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"team-list\" id=\"myTeamList\" style=\"flex:0 0 auto;max-height:38%;border-bottom:1px solid var(--border)\"><\u002Fdiv>\n\n    <div class=\"sidebar-header\">\n      <h2>Opponents<\u002Fh2>\n      <div style=\"display:flex;gap:6px\">\n        <button class=\"refresh-btn\" onclick=\"loadTeams()\"><svg viewBox=\"0 0 24 24\" width=\"12\" height=\"12\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"><\u002Fpath><path d=\"M21 3v5h-5\"><\u002Fpath><\u002Fsvg> Refresh<\u002Fbutton>\n        <button class=\"refresh-btn\" onclick=\"showAddTeam()\" style=\"border-color:var(--accent);color:var(--accent)\">+ Add<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"team-list\" id=\"teamList\">\n      <div class=\"empty\"><div class=\"empty-icon\"><svg viewBox=\"0 0 24 24\" width=\"34\" height=\"34\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M6.5 4.8c2.4 3.4 2.4 11 0 14.4M17.5 4.8c-2.4 3.4-2.4 11 0 14.4\"><\u002Fpath><\u002Fsvg><\u002Fdiv><p>Loading teams...<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Main -->\n  <div class=\"main\" id=\"mainPanel\">\n    <div class=\"empty empty-hero\">\n      <div class=\"empty-icon\"><svg viewBox=\"0 0 24 24\" width=\"34\" height=\"34\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"4.5\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"0.9\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n      <h3>Select a team to get started<\u002Fh3>\n      <p>Choose a team from the list on the left<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- ── Add Team / Sync Sheet Modal ──────────────────────────────────────── -->\n<div id=\"addTeamModal\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center\">\n  <div style=\"background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;width:500px;max-width:92vw\">\n    <div style=\"font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px\">Add Opponent<\u002Fdiv>\n    <div style=\"display:flex;border-bottom:1px solid var(--border);margin-bottom:16px\">\n      <div id=\"tabManual\" onclick=\"switchAddTab('manual')\" style=\"padding:6px 14px;font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer;border-bottom:2px solid var(--accent);color:var(--accent);letter-spacing:.05em;margin-bottom:-1px\">Manual<\u002Fdiv>\n      <div id=\"tabSheet\" onclick=\"switchAddTab('sheet')\" style=\"padding:6px 14px;font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);letter-spacing:.05em;margin-bottom:-1px\">Google Sheet<\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"paneManual\">\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <div>\n          <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Team Name *<\u002Fdiv>\n          <input id=\"addName\" placeholder=\"e.g. James Clemens 14U\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;font-family:inherit\">\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">GameChanger URL<\u002Fdiv>\n          <input id=\"addGcUrl\" placeholder=\"https://web.gc.com/teams/...\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Perfect Game URL<\u002Fdiv>\n          <input id=\"addPgUrl\" placeholder=\"https://www.perfectgame.org/...\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-top:18px\">\n        <button class=\"btn btn-primary\" style=\"flex:1\" onclick=\"submitAddTeam()\">Add Team<\u002Fbutton>\n        <button class=\"btn btn-outline\" onclick=\"hideAddTeam()\">Cancel<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"paneSheet\" style=\"display:none\">\n      <div style=\"font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.6\">Paste your published Google Sheet CSV URL. This will update <code style=\"background:var(--navy);padding:1px 5px;border-radius:3px;font-size:11px\">TEAMS_CSV_URL<\u002Fcode> in <code style=\"background:var(--navy);padding:1px 5px;border-radius:3px;font-size:11px\">.env<\u002Fcode> and sync all teams immediately.<\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Published CSV URL *<\u002Fdiv>\n        <input id=\"addSheetUrl\" placeholder=\"https://docs.google.com/spreadsheets/d/e/.../pub?output=csv\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n      <\u002Fdiv>\n      <div style=\"font-size:10px;color:var(--muted);margin-top:8px\">In Google Sheets: File → Share → Publish to web → CSV → Publish<\u002Fdiv>\n      <label style=\"display:flex;align-items:center;gap:8px;margin-top:14px;cursor:pointer\">\n        <input type=\"checkbox\" id=\"replaceAllTeams\" style=\"width:14px;height:14px;accent-color:var(--accent)\">\n        <span style=\"font-size:12px;color:var(--text)\">Replace all teams <span style=\"color:var(--muted);font-size:11px\">(removes teams not in this sheet)<\u002Fspan><\u002Fspan>\n      <\u002Flabel>\n      <div style=\"display:flex;gap:8px;margin-top:18px\">\n        <button class=\"btn btn-primary\" style=\"flex:1\" id=\"syncSheetBtn\" onclick=\"submitSyncSheet()\">Sync Sheet<\u002Fbutton>\n        <button class=\"btn btn-outline\" onclick=\"hideAddTeam()\">Cancel<\u002Fbutton>\n      <\u002Fdiv>\n      <div id=\"sheetSyncResult\" style=\"font-size:11px;margin-top:10px;display:none\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"addTeamError\" style=\"color:#e74c3c;font-size:11px;margin-top:8px;display:none\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── My Team Modal ─────────────────────────────────────────────────────── -->\n<div id=\"myTeamModal\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center\">\n  <div style=\"background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;width:500px;max-width:92vw\">\n    <div style=\"font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px\">My Team<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Team Name *<\u002Fdiv>\n        <input id=\"myName\" placeholder=\"e.g. James Clemens 14U\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">GameChanger URL<\u002Fdiv>\n        <input id=\"myGcUrl\" placeholder=\"https://web.gc.com/teams/...\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Perfect Game URL<\u002Fdiv>\n        <input id=\"myPgUrl\" placeholder=\"https://www.perfectgame.org/...\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Team Year *<\u002Fdiv>\n        <input id=\"myYear\" type=\"number\" min=\"2000\" max=\"2100\" placeholder=\"e.g. 2026\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;letter-spacing:.06em\">Season(s) <span style=\"text-transform:none;letter-spacing:0\">(choose one or more)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:14px\">\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"mySeason\" value=\"Spring\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Spring<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"mySeason\" value=\"Summer\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Summer<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"mySeason\" value=\"Fall\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Fall<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"mySeason\" value=\"Winter\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Winter<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-top:18px\">\n      <button class=\"btn btn-primary\" style=\"flex:1\" onclick=\"submitMyTeam()\">Save Team<\u002Fbutton>\n      <button class=\"btn btn-outline\" onclick=\"hideMyTeam()\">Cancel<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"myTeamError\" style=\"color:#e74c3c;font-size:11px;margin-top:8px;display:none\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── Billing Modal ────────────────────────────────────────────────────── -->\n<div id=\"billingModal\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center\">\n  <div style=\"background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;width:520px;max-width:92vw;max-height:86vh;overflow-y:auto\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\">\n      <div style=\"font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em\">Billing<\u002Fdiv>\n      <button class=\"btn btn-outline\" style=\"padding:4px 10px;font-size:11px\" onclick=\"closeBilling()\">Close<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"billingContent\" style=\"font-size:13px;color:var(--text)\">Loading…<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ── Edit My Team Modal ───────────────────────────────────────────────── -->\n<div id=\"editMyTeamModal\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;align-items:center;justify-content:center\">\n  <div style=\"background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;width:500px;max-width:92vw\">\n    <div style=\"font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px\">Edit My Team<\u002Fdiv>\n    <input id=\"editMyTeamIdx\" type=\"hidden\">\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Team Name *<\u002Fdiv>\n        <input id=\"editMyName\" placeholder=\"e.g. James Clemens 14U\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">GameChanger URL<\u002Fdiv>\n        <input id=\"editMyGcUrl\" placeholder=\"https://web.gc.com/teams/...\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Perfect Game URL<\u002Fdiv>\n        <input id=\"editMyPgUrl\" placeholder=\"https://www.perfectgame.org/...\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Team Year *<\u002Fdiv>\n        <input id=\"editMyYear\" type=\"number\" min=\"2000\" max=\"2100\" placeholder=\"e.g. 2026\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;letter-spacing:.06em\">Season(s) <span style=\"text-transform:none;letter-spacing:0\">(choose one or more)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:14px\">\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"editMySeason\" value=\"Spring\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Spring<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"editMySeason\" value=\"Summer\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Summer<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"editMySeason\" value=\"Fall\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Fall<\u002Flabel>\n          <label style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text)\"><input type=\"checkbox\" class=\"editMySeason\" value=\"Winter\" style=\"width:14px;height:14px;accent-color:var(--accent)\">Winter<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-top:18px\">\n      <button class=\"btn btn-primary\" style=\"flex:1\" onclick=\"submitEditMyTeam()\">Save Changes<\u002Fbutton>\n      <button class=\"btn btn-outline\" onclick=\"hideEditMyTeam()\">Cancel<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"editMyTeamError\" style=\"color:#e74c3c;font-size:11px;margin-top:8px;display:none\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<!-- ── Edit Opponent Modal ──────────────────────────────────────────────── -->\n<div id=\"editTeamModal\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:101;align-items:center;justify-content:center\">\n  <div style=\"background:var(--card);border:1px solid var(--border);border-radius:8px;padding:24px;width:500px;max-width:92vw\">\n    <div style=\"font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px\">Edit Opponent<\u002Fdiv>\n    <input id=\"editTeamId\" type=\"hidden\">\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Team Name *<\u002Fdiv>\n        <input id=\"editName\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:13px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">GameChanger URL<\u002Fdiv>\n        <input id=\"editGcUrl\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:.06em\">Perfect Game URL<\u002Fdiv>\n        <input id=\"editPgUrl\" style=\"width:100%;background:var(--navy);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:12px;font-family:inherit\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"editTeamError\" style=\"display:none;color:#ff8a80;font-size:12px;margin-top:12px\"><\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-top:18px\">\n      <button class=\"btn btn-primary\" style=\"flex:1\" onclick=\"submitEditTeam()\">Save Changes<\u002Fbutton>\n      <button class=\"btn btn-outline\" onclick=\"hideEditTeam()\">Cancel<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── Auth ──────────────────────────────────────────────────────────────────────\nconst AUTH_KEY = 'vs_auth';  // localStorage key\nconst DESIGN_MODE = false; // Production: login/auth enabled. Set true only in Claude Design preview.\n\n// ── Mock data (used only when DESIGN_MODE is true) ───────────────────────\nconst MOCK_TEAMS = [\n  {\n    id: 1,\n    team_name: 'VBA National 14U',\n    gc_team_url: 'https://gc.com/mock-team',\n    pg_team_url: 'https://perfectgame.org/mock-team',\n    game_count: 12,\n    last_game: '2026-06-21',\n    hasGC: true,\n    hasPG: true,\n    hasGameUrls: true,\n    stats: { wins: 8, losses: 4, plays: 842, batters: 14 }\n  },\n  {\n    id: 2,\n    team_name: 'Birmingham Stars 14U',\n    gc_team_url: 'https://gc.com/mock-team-2',\n    pg_team_url: null,\n    game_count: 9,\n    last_game: '2026-06-18',\n    hasGC: true,\n    hasPG: false,\n    hasGameUrls: false,\n    stats: { wins: 6, losses: 3, plays: 611, batters: 13 }\n  }\n];\n\nconst MOCK_GAMES = [\n  {\n    id: 101,\n    gc_game_id: 'mock-game-101',\n    gc_game_url: 'https://gc.com/mock-game',\n    game_date: '2026-06-21',\n    game_time: '4:00 PM',\n    result: 'W',\n    score_us: 7,\n    score_them: 3,\n    opponent_name: 'Excel Blue Wave National',\n    location: 'River Run Park',\n    season_type: 'Summer 2026'\n  },\n  {\n    id: 102,\n    gc_game_id: 'mock-game-102',\n    gc_game_url: 'https://gc.com/mock-game-2',\n    game_date: '2026-06-18',\n    game_time: '6:30 PM',\n    result: 'L',\n    score_us: 4,\n    score_them: 5,\n    opponent_name: 'USA Prime',\n    location: 'Hoover, AL',\n    season_type: 'Summer 2026'\n  }\n];\n\nconst MOCK_REPORTS = [\n  {\n    name: 'VBA_National_14U_Scouting_Report.docx',\n    size: 245760,\n    mtime: Date.now()\n  },\n  {\n    name: 'Birmingham_Stars_14U_Scouting_Report.pdf',\n    size: 389120,\n    mtime: Date.now() - 86400000\n  }\n];\n\nfunction mockApiResponse(url, options = {}) {\n  const path = typeof url === 'string' ? url : String(url);\n\n  if (path === '/api/teams') {\n    return Promise.resolve(new Response(JSON.stringify(MOCK_TEAMS), {\n      status: 200,\n      headers: { 'Content-Type': 'application/json' }\n    }));\n  }\n\n  if (/^\\/api\\/teams\\/\\d+\\/games/.test(path)) {\n    return Promise.resolve(new Response(JSON.stringify(MOCK_GAMES), {\n      status: 200,\n      headers: { 'Content-Type': 'application/json' }\n    }));\n  }\n\n  if (/^\\/api\\/teams\\/\\d+\\/game-urls/.test(path)) {\n    return Promise.resolve(new Response(JSON.stringify([]), {\n      status: 200,\n      headers: { 'Content-Type': 'application/json' }\n    }));\n  }\n\n  if (path === '/api/reports') {\n    return Promise.resolve(new Response(JSON.stringify(MOCK_REPORTS), {\n      status: 200,\n      headers: { 'Content-Type': 'application/json' }\n    }));\n  }\n\n  if (path.includes('/api/run/') || path.includes('/api/jobs/')) {\n    return Promise.resolve(new Response(JSON.stringify({\n      ok: true,\n      jobId: 'design-preview-job',\n      status: 'done',\n      logs: [\n        { t: Date.now(), line: 'Design preview mode: mock job started.' },\n        { t: Date.now(), line: 'Design preview mode: mock job completed.' }\n      ]\n    }), {\n      status: 200,\n      headers: { 'Content-Type': 'application/json' }\n    }));\n  }\n\n  return Promise.resolve(new Response(JSON.stringify({ ok: true }), {\n    status: 200,\n    headers: { 'Content-Type': 'application/json' }\n  }));\n}\n\nfunction getSession() {\n  try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; }\n}\nfunction saveSession(data) {\n  localStorage.setItem(AUTH_KEY, JSON.stringify(data));\n}\nfunction clearSession() {\n  localStorage.removeItem(AUTH_KEY);\n}\n\n// Wraps fetch() to automatically attach Authorization header.\n// If the server returns 401, clears session and shows login.\nasync function apiFetch(url, options = {}) {\n  if (DESIGN_MODE) return mockApiResponse(url, options);\n  const session = getSession();\n  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };\n  if (session?.accessToken) {\n    headers['Authorization'] = `Bearer ${session.accessToken}`;\n  }\n  const res = await fetch(url, { ...options, headers });\n  if (res.status === 401) {\n    clearSession();\n    showLogin();\n    throw new Error('Session expired — please sign in again.');\n  }\n  return res;\n}\n\nasync function submitLogin() {\n  const email    = document.getElementById('loginEmail').value.trim();\n  const password = document.getElementById('loginPassword').value;\n  const errEl    = document.getElementById('loginError');\n  const btn      = document.getElementById('loginBtn');\n\n  errEl.style.display = 'none';\n  errEl.style.color = '';\n  if (!email || !password) {\n    errEl.textContent = 'Email and password are required.';\n    errEl.style.display = 'block';\n    return;\n  }\n\n  btn.disabled = true;\n  btn.textContent = 'Signing in...';\n\n  try {\n    const res  = await fetch('/api/auth/login', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ email, password }),\n    });\n    const data = await res.json();\n    if (!res.ok) {\n      errEl.textContent = data.error || 'Sign in failed.';\n      errEl.style.display = 'block';\n      return;\n    }\n    saveSession(data);\n    showDashboard(data.user);\n    loadTeams();\n  } catch (err) {\n    errEl.textContent = err.message;\n    errEl.style.display = 'block';\n  } finally {\n    btn.disabled = false;\n    btn.textContent = 'Sign In';\n  }\n}\n\nasync function logout() {\n  if (DESIGN_MODE) {\n    showDashboard({ id: 'design-preview', email: 'design-preview@jobuscout.local' });\n    loadTeams();\n    return;\n  }\n  const session = getSession();\n  if (session?.accessToken) {\n    try {\n      await fetch('/api/auth/logout', {\n        method: 'POST',\n        headers: { 'Authorization': `Bearer ${session.accessToken}` },\n      });\n    } catch {}\n  }\n  clearSession();\n  showLogin();\n}\n\nfunction showLogin() {\n  // TEMP CLAUDE DESIGN BYPASS: never show login while DESIGN_MODE is on.\n  if (DESIGN_MODE) {\n    const loginScreen = document.getElementById('loginScreen');\n    if (loginScreen) loginScreen.classList.add('hidden');\n    showDashboard({ id: 'design-preview', email: 'design-preview@jobuscout.local' });\n    if (!window.__designModeLoadedTeams) {\n      window.__designModeLoadedTeams = true;\n      setTimeout(() => { if (typeof loadTeams === 'function') loadTeams(); }, 0);\n    }\n    return;\n  }\n  document.getElementById('loginScreen').classList.remove('hidden');\n  document.getElementById('forgotScreen').style.display = 'none';\n  document.getElementById('resetPasswordScreen').style.display = 'none';\n  document.getElementById('signupScreen').style.display = 'none';\n  document.getElementById('userBadge').style.display = 'none';\n  // Reset login form\n  const errEl = document.getElementById('loginError');\n  if (errEl) { errEl.style.display = 'none'; }\n  const btn = document.getElementById('loginBtn');\n  if (btn) { btn.disabled = false; btn.textContent = 'Sign In'; }\n}\n\n// ── Forgot / Reset Password ─────────────────────────────────────────────────\nfunction showForgotPassword() {\n  document.getElementById('loginScreen').classList.add('hidden');\n  document.getElementById('resetPasswordScreen').style.display = 'none';\n  document.getElementById('signupScreen').style.display = 'none';\n  document.getElementById('forgotScreen').style.display = 'flex';\n  const errEl = document.getElementById('forgotError');\n  const okEl  = document.getElementById('forgotSuccess');\n  if (errEl) errEl.style.display = 'none';\n  if (okEl)  okEl.style.display = 'none';\n}\n\nasync function submitForgotPassword() {\n  const email = document.getElementById('forgotEmail').value.trim();\n  const errEl = document.getElementById('forgotError');\n  const okEl  = document.getElementById('forgotSuccess');\n  const btn   = document.getElementById('forgotBtn');\n  errEl.style.display = 'none';\n  okEl.style.display  = 'none';\n  if (!email) { errEl.textContent = 'Email is required.'; errEl.style.display = 'block'; return; }\n\n  btn.disabled = true;\n  btn.textContent = 'Sending...';\n  try {\n    const res  = await fetch('/api/auth/forgot-password', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ email }),\n    });\n    const data = await res.json();\n    if (!res.ok) throw new Error(data.error || 'Failed to send reset link.');\n    okEl.textContent = data.message || 'If an account exists for that email, a reset link has been sent.';\n    okEl.style.display = 'block';\n  } catch (err) {\n    errEl.textContent = err.message;\n    errEl.style.display = 'block';\n  } finally {\n    btn.disabled = false;\n    btn.textContent = 'Send Reset Link';\n  }\n}\n\nlet __resetAccessToken = null;\nfunction showResetPassword(accessToken) {\n  __resetAccessToken = accessToken;\n  document.getElementById('loginScreen').classList.add('hidden');\n  document.getElementById('forgotScreen').style.display = 'none';\n  document.getElementById('signupScreen').style.display = 'none';\n  document.getElementById('resetPasswordScreen').style.display = 'flex';\n}\n\n// ── Sign Up ──────────────────────────────────────────────────────────────────\nfunction showSignup(prefill = {}) {\n  document.getElementById('loginScreen').classList.add('hidden');\n  document.getElementById('forgotScreen').style.display = 'none';\n  document.getElementById('resetPasswordScreen').style.display = 'none';\n  document.getElementById('signupScreen').style.display = 'flex';\n  if (prefill.tier) document.getElementById('signupTier').value = prefill.tier;\n  if (prefill.interval) document.getElementById('signupInterval').value = prefill.interval;\n  updateSignupIntervalVisibility();\n  const errEl = document.getElementById('signupError');\n  if (errEl) errEl.style.display = 'none';\n}\n\nfunction updateSignupIntervalVisibility() {\n  const tier = document.getElementById('signupTier').value;\n  document.getElementById('signupIntervalField').style.display = tier === 'free' ? 'none' : 'block';\n}\n\nasync function submitSignup() {\n  const orgName  = document.getElementById('signupOrgName').value.trim();\n  const email    = document.getElementById('signupEmail').value.trim();\n  const password = document.getElementById('signupPassword').value;\n  const tier     = document.getElementById('signupTier').value;\n  const interval = document.getElementById('signupInterval').value;\n  const errEl    = document.getElementById('signupError');\n  const btn      = document.getElementById('signupBtn');\n\n  errEl.style.display = 'none';\n  if (!orgName || !email || !password) {\n    errEl.textContent = 'Organization name, email, and password are required.';\n    errEl.style.display = 'block';\n    return;\n  }\n\n  btn.disabled = true;\n  btn.textContent = 'Creating account...';\n  try {\n    const res  = await fetch('/api/auth/signup', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ orgName, email, password, tier, interval }),\n    });\n    const data = await res.json();\n    if (!res.ok) throw new Error(data.error || 'Failed to create account.');\n\n    saveSession(data);\n    if (data.checkoutUrl) {\n      window.location.href = data.checkoutUrl;\n    } else {\n      showDashboard(data.user);\n      loadTeams();\n    }\n  } catch (err) {\n    errEl.textContent = err.message;\n    errEl.style.display = 'block';\n  } finally {\n    btn.disabled = false;\n    btn.textContent = 'Create Account';\n  }\n}\n\nasync function submitResetPassword() {\n  const newPassword     = document.getElementById('resetNewPassword').value;\n  const confirmPassword = document.getElementById('resetConfirmPassword').value;\n  const errEl = document.getElementById('resetError');\n  const btn   = document.getElementById('resetBtn');\n  errEl.style.display = 'none';\n\n  if (!newPassword || newPassword.length < 8) {\n    errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return;\n  }\n  if (newPassword !== confirmPassword) {\n    errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return;\n  }\n\n  btn.disabled = true;\n  btn.textContent = 'Saving...';\n  try {\n    const res  = await fetch('/api/auth/reset-password', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ accessToken: __resetAccessToken, newPassword }),\n    });\n    const data = await res.json();\n    if (!res.ok) throw new Error(data.error || 'Failed to reset password.');\n    __resetAccessToken = null;\n    clearSession();\n    showLogin();\n    const loginErr = document.getElementById('loginError');\n    if (loginErr) {\n      loginErr.style.color = '#2ecc71';\n      loginErr.textContent = 'Password updated. Sign in with your new password.';\n      loginErr.style.display = 'block';\n    }\n  } catch (err) {\n    errEl.textContent = err.message;\n    errEl.style.display = 'block';\n  } finally {\n    btn.disabled = false;\n    btn.textContent = 'Set New Password';\n  }\n}\n\nfunction showDashboard(user) {\n  document.getElementById('loginScreen').classList.add('hidden');\n  const badge = document.getElementById('userBadge');\n  const emailEl = document.getElementById('userEmail');\n  if (badge) badge.style.display = 'flex';\n  if (emailEl) emailEl.textContent = user?.email || '';\n  refreshAdminButton();\n  renderSupportSessionBanner();\n}\n\n// ── Admin panel access ───────────────────────────────────────────────────────\n// Never decided by comparing user.email client-side — the button's visibility\n// only reflects what the server (GET /api/admin/status, backed by the\n// platform_admins table) actually confirmed for this authenticated user.\n// /admin and every /api/admin/* route independently re-verify this too.\nasync function refreshAdminButton() {\n  const btn = document.getElementById('adminPanelBtn');\n  if (!btn) return;\n  try {\n    const session = getSession();\n    if (!session?.accessToken) { btn.style.display = 'none'; return; }\n    const res = await fetch('/api/admin/status', {\n      headers: { Authorization: 'Bearer ' + session.accessToken },\n    });\n    if (!res.ok) { btn.style.display = 'none'; return; }\n    const data = await res.json();\n    btn.style.display = data?.isAdmin ? '' : 'none';\n  } catch (e) {\n    btn.style.display = 'none';\n  }\n}\n\n// ── Support-view session (admin browsing this dashboard scoped to a customer org) ──\nconst SUPPORT_SESSION_KEY = 'jobuSupportSession';\n\nfunction getSupportSession() {\n  try {\n    const raw = sessionStorage.getItem(SUPPORT_SESSION_KEY);\n    return raw ? JSON.parse(raw) : null;\n  } catch (e) { return null; }\n}\n\nfunction renderSupportSessionBanner() {\n  const banner = document.getElementById('supportSessionBanner');\n  const text = document.getElementById('supportSessionText');\n  const support = getSupportSession();\n  if (!banner || !text) return;\n  if (!support) { banner.style.display = 'none'; return; }\n  const expires = support.expiresAt ? new Date(support.expiresAt) : null;\n  if (expires && expires.getTime() < Date.now()) {\n    sessionStorage.removeItem(SUPPORT_SESSION_KEY);\n    banner.style.display = 'none';\n    return;\n  }\n  text.textContent = 'Viewing Jobu Scout as ' + (support.orgName || 'customer') +\n    ' — Read Only' + (expires ? (' (expires ' + expires.toLocaleTimeString() + ')') : '');\n  banner.style.display = 'flex';\n}\n\nasync function endSupportSessionView() {\n  const support = getSupportSession();\n  if (!support) return;\n  try {\n    const session = getSession();\n    await fetch('/api/admin/support-sessions/' + support.sessionId + '/end', {\n      method: 'POST',\n      headers: {\n        'Content-Type': 'application/json',\n        Authorization: 'Bearer ' + (session?.accessToken || ''),\n      },\n    });\n  } catch (e) {}\n  sessionStorage.removeItem(SUPPORT_SESSION_KEY);\n  window.location.href = '/admin';\n}\n\n// Auto-attach the active support session's token to same-origin API calls so\n// every existing fetch() call site in this file transparently browses the\n// support-view tenant's data without being individually rewritten. The\n// server independently re-validates the token (expiry, ownership, admin\n// status) on every request — this header is a transport convenience only.\n(function installSupportSessionFetchWrapper() {\n  const originalFetch = window.fetch.bind(window);\n  window.fetch = function (input, init) {\n    const support = getSupportSession();\n    if (!support) return originalFetch(input, init);\n    const url = typeof input === 'string' ? input : (input && input.url) || '';\n    if (!url.startsWith('/api/')) return originalFetch(input, init);\n    const opts = Object.assign({}, init);\n    opts.headers = Object.assign({}, (init && init.headers) || {}, {\n      'X-Support-Session': support.token,\n    });\n    return originalFetch(input, opts);\n  };\n})();\n\n// ── Sidebar collapse & dropdown menus ────────────────────────────────────\nfunction toggleSidebar() {\n  const layout = document.getElementById('appLayout');\n  if (!layout) return;\n  const collapsed = layout.classList.toggle('sidebar-collapsed');\n  try { localStorage.setItem('jobuSidebarCollapsed', collapsed ? '1' : '0'); } catch (e) {}\n}\ntry {\n  if (localStorage.getItem('jobuSidebarCollapsed') === '1') {\n    document.addEventListener('DOMContentLoaded', () => {\n      document.getElementById('appLayout')?.classList.add('sidebar-collapsed');\n    });\n  }\n} catch (e) {}\n\nfunction closeAllMenus() {\n  document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));\n}\ndocument.addEventListener('click', closeAllMenus);\nfunction toggleTeamMenu(evt, id) {\n  evt.stopPropagation();\n  const menu = document.getElementById('teamMenu-' + id);\n  if (!menu) return;\n  const isOpen = menu.classList.contains('open');\n  closeAllMenus();\n  if (!isOpen) menu.classList.add('open');\n}\nfunction toggleMoreMenu(evt) {\n  evt.stopPropagation();\n  const menu = document.getElementById('pipelineMoreMenu');\n  if (!menu) return;\n  const isOpen = menu.classList.contains('open');\n  closeAllMenus();\n  if (!isOpen) menu.classList.add('open');\n}\n\n// ── State ────────────────────────────────────────────────────────────────────\nlet selectedTeam = null;\nlet allTeams     = [];\nlet currentJobId   = null;\nlet currentJobType = null;\nlet jobStream      = null;\nlet liveTeamSummaryTimer = null;\nlet activeTab      = 'run';\n\n// Persisted options across team switches\nconst opts = {\n  gameLocation:     '',\n  gameDate:         new Date().toISOString().slice(0, 10), // defaults to today\n  gameTime:         '',\n  humanObs:         '',\n  gameScope:        'all',\n  customPrompt:     '',\n  matchupOurTeamId: null,\n  matchupOppTeamId: null,\n  matchupProbable:  '',\n};\n\n// ── Load teams ───────────────────────────────────────────────────────────────\nasync function loadTeams() {\n  const res   = await apiFetch('/api/teams');\n  allTeams    = await res.json();\n  const list  = document.getElementById('teamList');\n  const opponentTeams = allTeams.filter(t => !t.is_our_team);\n\n  if (!opponentTeams.length) {\n    list.innerHTML = `<div class=\"empty\"><div class=\"empty-icon\"><svg viewBox=
